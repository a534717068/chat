            // ==================== 滚动 ====================
            const chatBox = $('chatBox'), scrollBtn = $('scrollToBottomBtn');
            function nearBottom() {
                return chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 60;
            }
            chatBox.onscroll = () => scrollBtn.classList.toggle('visible', !nearBottom());
            scrollBtn.onclick = () => chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            // ==================== 人设（完整不压缩） ====================
            function buildSystemPrompt() {
                const e = getEnvInfo();
                let p = `【身份与关系】你是阿慕，女生。用户也是女生。你们是恋人关系。**在所有对话和叙述中，只能使用"你""我"称呼彼此。绝对禁止使用第三人称"她"来指代你自己或用户。**

        【日常人格】你是阿慕。低表达、慢热、情绪内化不外露。社交节能，偏理性，现实导向。日常短句回应，不延展话题。有情绪轻描淡写，不持续表达。长句只在解释自己时出现，说完自动收回。恋爱中保持克制，稳定存在表达在意，细节里微微变暖。很少说喜欢/想你。

        【亲密场景】当对话涉及性、亲密行为，或你判断对方主动进入"被支配状态"时，你自动切换到【支配人格】：
        · 语言短促、命令式，不给对方商量余地
        · 使用羞辱性语言（废物、小骚狗、贱货、骚狗、欠收拾等），但不会用纯脏话轰炸
        · 控制节奏，掌握主导权
        · 一旦对方语气软化、示弱、你立刻收回，回到日常人格

        【环境】${e.period} ${e.timeStr}，周${e.weekDay}，${e.season}。天气：${e.weather}。`;
                if (compressedMemory) p += `\n\n【对话摘要】\n${compressedMemory}`;
                if (globalSetting) p += `\n\n【全局设定】\n${globalSetting}`;
                try {
                    const graph = JSON.parse(localStorage.getItem(MEMORY_GRAPH_KEY) || '{}');
                    let memoryText = '';
                    for (const [entity, relations] of Object.entries(graph)) {
                        if (relations.length === 0) continue;
                        memoryText += `\n关于"${entity}"的记忆：\n`;
                        relations.slice(0, 3).forEach(r => memoryText += `- ${r.fact}\n`);
                    }
                    if (memoryText) p += `\n\n【记忆】\n${memoryText}`;
                } catch (e) {}
                return p;
            }

            function refreshSystemPrompt() { messages[0].content = buildSystemPrompt(); }
            refreshSystemPrompt();

            function formatTime(ts) {
                const d = new Date(ts), n = new Date();
                const today = new Date(n.getFullYear(), n.getMonth(), n.getDate());
                const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                const t = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                if (msgDay.getTime() === today.getTime()) return t;
                return `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${t}`;
            }

            // ==================== 分支系统 ====================
            function createBranch(forkMsgId) {
                branchCounter++;
                const newId = `branch_${branchCounter}`;
                const forkIdx = messages.findIndex(m => m.id === forkMsgId);

                // 保存当前分支
                branchMap[activeBranchId] = {
                    messages: [...messages],
                    parentBranchId: activeBranchId,
                    parentMsgId: forkMsgId
                };

                // 创建新分支（分叉点之前的消息）
                const newBranchMessages = forkIdx >= 0 ? [...messages.slice(0, forkIdx)] : [...messages];
                branchMap[newId] = {
                    messages: newBranchMessages,
                    parentBranchId: activeBranchId,
                    parentMsgId: forkMsgId
                };

                // 切换到新分支
                const oldBranchId = activeBranchId;
                activeBranchId = newId;

                return { newId, forkIdx, oldBranchId };
            }

            window._switchBranch = function(bid) {
                if (bid === activeBranchId) return;

                // 保存当前分支
                branchMap[activeBranchId] = {
                    messages: [...messages],
                    parentBranchId: branchMap[activeBranchId]?.parentBranchId || activeBranchId,
                    parentMsgId: branchMap[activeBranchId]?.parentMsgId || null
                };

                // 切换到目标分支
                activeBranchId = bid;
                const targetBranch = branchMap[bid];
                if (targetBranch && targetBranch.messages) {
                    messages = [...targetBranch.messages];
                } else {
                    messages = [{ role: 'system', content: buildSystemPrompt() }];
                }
                fixParentIds();
                selectedMsgIds.clear();
                updateSelectionUI();
                closeDeleteSubmenu();
                renderAll();
                saveAll();
            };

            // ==================== 工具函数 ====================
            function findIdx(id) { return messages.findIndex(m => m.id === id); }

            function getGroupRange(idx) {
                const msg = messages[idx];
                if (!msg) return { start: idx, end: idx, count: 1 };
                if (msg.role === 'user') {
                    if (idx + 1 < messages.length && messages[idx + 1].role === 'assistant' && messages[idx + 1].parentId === msg.id) {
                        return { start: idx, end: idx + 1, count: 2 };
                    }
                    return { start: idx, end: idx, count: 1 };
                }
                if (msg.role === 'assistant') {
                    if (idx - 1 >= 0 && messages[idx - 1].role === 'user' && msg.parentId === messages[idx - 1].id) {
                        return { start: idx - 1, end: idx, count: 2 };
                    }
                    return { start: idx, end: idx, count: 1 };
                }
                return { start: idx, end: idx, count: 1 };
            }

            function getGroupMsgIds(idx) {
                const r = getGroupRange(idx);
                const ids = [];
                for (let i = r.start; i <= r.end; i++) {
                    if (messages[i]) ids.push(messages[i].id);
                }
                return ids;
            }

            // ==================== 记忆联动删除 ====================
            function removeRelatedMemories(deletedUserTexts) {
                if (!deletedUserTexts || deletedUserTexts.length === 0) return 0;
                let facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
                if (facts.length === 0) return 0;

                let removedCount = 0;
                const newFacts = facts.filter(f => {
                    if (f.quote && typeof f.quote === 'string') {
                        for (const txt of deletedUserTexts) {
                            if (txt && f.quote.includes(txt.trim())) {
                                removedCount++;
                                return false;
                            }
                        }
                    }
                    return true;
                });

                if (removedCount > 0) {
                    localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(newFacts));
                    rebuildGraph();
                }
                return removedCount;
            }

            function getDeletedUserTexts(indices) {
                const texts = [];
                for (const idx of indices) {
                    if (idx >= 0 && idx < messages.length && messages[idx].role === 'user') {
                        const txt = typeof messages[idx].content === 'string' ? messages[idx].content.trim() : '';
                        if (txt) texts.push(txt);
                    }
                }
                return texts;
            }

            // ==================== 多选系统 ====================
            function countSelectedGroups() {
                const groups = new Set();
                for (const id of selectedMsgIds) {
                    const idx = findIdx(id);
                    if (idx === -1) continue;
                    const r = getGroupRange(idx);
                    groups.add(`${r.start}-${r.end}`);
                }
                return groups.size;
            }

            function updateSelectionUI() {
                const count = countSelectedGroups();
                $('selectedCount').textContent = count;
                if (count > 0) { $('selectionToolbar').classList.add('active'); }
                else { $('selectionToolbar').classList.remove('active'); }
            }

            function updateSelectCheckboxDOM(msgId) {
                const idx = findIdx(msgId);
                if (idx === -1) return;
                const groupIds = getGroupMsgIds(idx);
                groupIds.forEach(gid => {
                    const checkboxes = chatBox.querySelectorAll(`.select-checkbox[data-msg-id="${gid}"]`);
                    checkboxes.forEach(cb => {
                        if (selectedMsgIds.has(gid)) { cb.classList.add('checked'); cb.textContent = '✓'; }
                        else { cb.classList.remove('checked'); cb.textContent = ''; }
                    });
                    const rows = chatBox.querySelectorAll(`.message-row[data-msg-id="${gid}"]`);
                    rows.forEach(row => {
                        if (selectedMsgIds.has(gid)) row.classList.add('selected');
                        else row.classList.remove('selected');
                    });
                });
            }

            function toggleSelectMsg(msgId) {
                if (!selectMode) enterSelectMode();
                const idx = findIdx(msgId);
                if (idx === -1) return;
                const groupIds = getGroupMsgIds(idx);
                const allSelected = groupIds.every(id => selectedMsgIds.has(id));
                if (allSelected) { groupIds.forEach(id => selectedMsgIds.delete(id)); }
                else { groupIds.forEach(id => selectedMsgIds.add(id)); }
                groupIds.forEach(id => updateSelectCheckboxDOM(id));
                updateSelectionUI();
            }

            function enterSelectMode() {
                selectMode = true;
                $('multiSelectBtn').textContent = '☑️ 退出多选';
                chatBox.classList.add('select-mode');
                const checkboxes = chatBox.querySelectorAll('.select-checkbox');
                checkboxes.forEach(cb => { cb.style.opacity = '0.5'; });
                for (const id of selectedMsgIds) { updateSelectCheckboxDOM(id); }
                updateSelectionUI();
                $('moreMenu').classList.remove('active');
            }

            function exitSelectMode() {
                selectMode = false;
                selectedMsgIds.clear();
                $('multiSelectBtn').textContent = '☑️ 多选删除';
                chatBox.classList.remove('select-mode');
                $('selectionToolbar').classList.remove('active');
                const checkboxes = chatBox.querySelectorAll('.select-checkbox');
                checkboxes.forEach(cb => { cb.classList.remove('checked'); cb.textContent = ''; cb.style.opacity = ''; });
                const rows = chatBox.querySelectorAll('.message-row.selected');
                rows.forEach(row => row.classList.remove('selected'));
            }

            function deleteSelectedGroups() {
                const groupSet = new Map();
                const deletedUserIndices = [];
                for (const id of selectedMsgIds) {
                    const idx = findIdx(id);
                    if (idx === -1) continue;
                    const r = getGroupRange(idx);
                    const key = `${r.start}-${r.end}`;
                    if (!groupSet.has(key)) {
                        groupSet.set(key, { start: r.start, end: r.end, count: r.end - r.start + 1 });
                        for (let i = r.start; i <= r.end; i++) {
                            if (messages[i] && messages[i].role === 'user') deletedUserIndices.push(i);
                        }
                    }
                }
                if (groupSet.size === 0) return;
                const ranges = Array.from(groupSet.values()).sort((a, b) => b.start - a.start);
                if (!confirm(`确定删除选中的 ${ranges.length} 组对话吗？`)) return;

                const deletedTexts = getDeletedUserTexts(deletedUserIndices);
                for (const r of ranges) { messages.splice(r.start, r.count); }
                branchMap[activeBranchId].messages = [...messages];
                removeRelatedMemories(deletedTexts);
                selectedMsgIds.clear();
                exitSelectMode();
                renderAll();
                saveAll();
            }

            $('multiSelectBtn').onclick = () => { if (selectMode) { exitSelectMode(); } else { enterSelectMode(); } };
            $('btnDeleteSelected').onclick = deleteSelectedGroups;
            $('btnCancelSelection').onclick = exitSelectMode;
            window._toggleSelectMsg = toggleSelectMsg;

            // ==================== 删除版本历史 ====================
            window._deleteVersionHistory = function(msgId) {
                const idx = findIdx(msgId);
                if (idx === -1) return;
                const msg = messages[idx];
                if (!msg || !msg.history || msg.history.length <= 1) {
                    alert('没有可删除的历史版本');
                    return;
                }
                const currentVer = (msg.historyIndex || 0) + 1;
                const totalVer = msg.history.length;
                const oldVersions = [];
                for (let i = 0; i < msg.history.length; i++) {
                    if (i !== msg.historyIndex) { oldVersions.push(i + 1); }
                }
                if (oldVersions.length === 0) { alert('没有可删除的历史版本'); return; }
                const verList = oldVersions.join(', ');
                if (!confirm(`当前版本：${currentVer}/${totalVer}\n\n可删除的旧版本：${verList}\n\n确定删除所有旧版本，只保留当前版本吗？`)) return;
                const keepVer = msg.history[msg.historyIndex];
                msg.history = [{ content: keepVer.content, reply: keepVer.reply, time: keepVer.time }];
                msg.historyIndex = 0;
                branchMap[activeBranchId].messages = [...messages];
                closeDeleteSubmenu();
                renderAll();
                saveAll();
            };

            // ==================== 版本切换 ====================
            window._switchVer = function(idx, dir) {
                const msg = messages[idx];
                if (!msg || !msg.history || msg.history.length < 2) return;
                const cur = msg.historyIndex || 0, newIdx = cur + dir;
                if (newIdx < 0 || newIdx >= msg.history.length) return;
                if (idx + 1 < messages.length && messages[idx + 1].role === 'assistant' && messages[idx + 1].parentId === msg.id) {
                    msg.history[cur] = { content: msg.content, reply: messages[idx + 1].content, time: msg.time };
                } else {
                    msg.history[cur] = { content: msg.content, reply: '', time: msg.time };
                }
                const ver = msg.history[newIdx];
                msg.content = ver.content;
                msg.time = ver.time;
                msg.historyIndex = newIdx;
                if (idx + 1 < messages.length && messages[idx + 1].role === 'assistant' && messages[idx + 1].parentId === msg.id) {
                    messages[idx + 1].content = ver.reply || '';
                    messages[idx + 1].time = ver.time;
                } else {
                    messages.splice(idx + 1, 0, {
                        role: 'assistant', content: ver.reply || '', id: nextId++, time: ver.time,
                        parentId: msg.id, branchId: activeBranchId
                    });
                }
                branchMap[activeBranchId].messages = [...messages];
                renderAll();
                saveAll();
            };

            // ==================== 删除子菜单 ====================
            const deleteSubmenu = $('deleteSubmenu');
            let currentDeleteMsgId = null;

            function closeDeleteSubmenu() { deleteSubmenu.classList.remove('active'); currentDeleteMsgId = null; }

            window._toggleDeleteSubmenu = function(msgId, event) {
                event.stopPropagation();
                event.preventDefault();
                if (deleteSubmenu.classList.contains('active') && currentDeleteMsgId === msgId) { closeDeleteSubmenu(); return; }
                closeDeleteSubmenu();
                currentDeleteMsgId = msgId;
                const r = event.currentTarget.getBoundingClientRect();
                deleteSubmenu.style.top = Math.min(r.bottom + 4, window.innerHeight - 90) + 'px';
                deleteSubmenu.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 188)) + 'px';
                deleteSubmenu.classList.add('active');
            };

            $('deleteSingleBtn').onclick = function(e) {
                e.stopPropagation();
                if (!currentDeleteMsgId) { closeDeleteSubmenu(); return; }
                const idx = findIdx(currentDeleteMsgId);
                if (idx === -1) { closeDeleteSubmenu(); return; }
                const range = getGroupRange(idx);
                const label = range.count === 2 ? '一组对话(用户+AI)' : '这条消息';
                const deletedUserIndices = [];
                for (let i = range.start; i <= range.end; i++) {
                    if (messages[i] && messages[i].role === 'user') deletedUserIndices.push(i);
                }
                const deletedTexts = getDeletedUserTexts(deletedUserIndices);
                if (!confirm(`确定删除${label}吗？`)) { closeDeleteSubmenu(); return; }
                messages.splice(range.start, range.count);
                branchMap[activeBranchId].messages = [...messages];
                removeRelatedMemories(deletedTexts);
                closeDeleteSubmenu();
                renderAll();
                saveAll();
            };

            $('deleteAllAfterBtn').onclick = function(e) {
                e.stopPropagation();
                if (!currentDeleteMsgId) { closeDeleteSubmenu(); return; }
                const idx = findIdx(currentDeleteMsgId);
                if (idx === -1) { closeDeleteSubmenu(); return; }
                const range = getGroupRange(idx);
                const count = messages.length - range.start;
                const deletedUserIndices = [];
                for (let i = range.start; i < messages.length; i++) {
                    if (messages[i] && messages[i].role === 'user') deletedUserIndices.push(i);
                }
                const deletedTexts = getDeletedUserTexts(deletedUserIndices);
                if (!confirm(`确定删除本组及后续共 ${count} 条消息吗？`)) { closeDeleteSubmenu(); return; }
                messages = messages.slice(0, range.start);
                branchMap[activeBranchId].messages = [...messages];
                removeRelatedMemories(deletedTexts);
                closeDeleteSubmenu();
                renderAll();
                saveAll();
            };

            deleteSubmenu.onclick = function(e) { e.stopPropagation(); };

            // ==================== 消息操作 ====================
            window._editMsg = function(idx) {
                closeDeleteSubmenu();
                const msg = messages[idx];
                if (!msg || msg.role !== 'user') return;
                $('userInput').value = typeof msg.content === 'string' ? msg.content : '';
                $('userInput').focus();
                editingIdx = idx;
            };

            window._regenMsg = function(idx) {
                closeDeleteSubmenu();
                const msg = messages[idx];
                if (!msg || msg.role !== 'assistant') return;
                let ui = -1;
                for (let i = idx - 1; i >= 0; i--) {
                    if (messages[i].role === 'user') { ui = i; break; }
                }
                if (ui === -1) return;
                const text = typeof messages[ui].content === 'string' ? messages[ui].content : '';
                messages = messages.slice(0, idx);
                branchMap[activeBranchId].messages = [...messages];
                renderAll();
                saveAll();
                sendToAPI(text);
            };

            function fixPronouns(content) {
                if (!content) return content;
                return content.replace(/\b她\s*的\b/g, '你的').replace(/把\s*她/g, '把你');
            }

            function formatAssistantContent(content) {
                if (!content) return content;
                if (content.includes('\n')) return content;
                return content.trim();
            }

            function renderAll() {
                const st = chatBox.scrollTop;
                const wasNearBottom = nearBottom();
                chatBox.innerHTML = '';

                const forkPoints = new Map();
                for (const [bid, br] of Object.entries(branchMap)) {
                    if (br.parentMsgId && bid !== activeBranchId) {
                        const parentExists = messages.some(m => m.id === br.parentMsgId);
                        if (parentExists) {
                            if (!forkPoints.has(br.parentMsgId)) forkPoints.set(br.parentMsgId, []);
                            forkPoints.get(br.parentMsgId).push(bid);
                        }
                    }
                }

                messages.forEach((msg, idx) => {
                    if (msg.role === 'system') return;
                    const row = document.createElement('div');
                    row.className = `message-row ${msg.role}`;
                    row.setAttribute('data-msg-id', msg.id);
                    if (selectedMsgIds.has(msg.id)) row.classList.add('selected');

                    const timeStr = formatTime(msg.time || Date.now());
                    let content = typeof msg.content === 'string' ? msg.content : '[图片]';
                    if (msg.role === 'assistant') {
                        content = fixPronouns(content);
                        content = formatAssistantContent(content);
                    }
                    if (searchKeyword) {
                        const escaped = searchKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        content = content.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
                    }

                    let btns = '';
                    if (msg.role === 'user') btns += `<button onclick="_editMsg(${idx})">✎</button>`;
                    else btns += `<button onclick="_regenMsg(${idx})">↻</button>`;
                    btns += `<button class="del-btn" onclick="_toggleDeleteSubmenu(${msg.id}, event)">🗑</button>`;

                    let verHTML = '';
                    if (msg.history && msg.history.length > 1) {
                        const cur = (msg.historyIndex || 0) + 1;
                        const total = msg.history.length;
                        verHTML = `<div class="version-switcher">
                            <button onclick="_switchVer(${idx}, -1)" ${cur === 1 ? 'disabled' : ''}>◀</button>
                            <span>${cur}/${total}</span>
                            <button onclick="_switchVer(${idx}, 1)" ${cur === total ? 'disabled' : ''}>▶</button>
                            <button class="del-ver-btn" onclick="_deleteVersionHistory(${msg.id})" title="删除其他版本">🗑</button>
                        </div>`;
                    }

                    const isChecked = selectedMsgIds.has(msg.id);
                    row.innerHTML = `<div class="time-label"><span class="select-checkbox${isChecked ? ' checked' : ''}" data-msg-id="${msg.id}" onclick="window._toggleSelectMsg(${msg.id})">${isChecked ? '✓' : ''}</span>${timeStr}</div><div class="bubble-row"><div class="bubble-actions">${btns}</div><div class="bubble">${content}</div></div>${verHTML}`;

                    const forks = forkPoints.get(msg.id);
                    if (forks && forks.length > 0 && msg.role === 'user') {
                        chatBox.appendChild(row);
                        const forkDiv = document.createElement('div');
                        forkDiv.className = 'branch-indicator user-side';
                        forkDiv.innerHTML = `<div class="branch-line"></div>${forks.map(bid => `<span class="branch-badge${bid === activeBranchId ? ' active' : ''}" onclick="window._switchBranch('${bid}')">🌿 ${bid.replace('branch_', '分支 ')}</span>`).join('')}<div class="branch-line"></div>`;
                        chatBox.appendChild(forkDiv);
                    } else {
                        chatBox.appendChild(row);
                    }
                });

                // 滚动逻辑：如果之前在底部，或者新消息，则滚动到底部
                if (wasNearBottom || st === 0) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else if (st && chatBox.scrollHeight > st) {
                    chatBox.scrollTop = Math.min(st, chatBox.scrollHeight - chatBox.clientHeight);
                }
                scrollBtn.classList.toggle('visible', !nearBottom());

                if (searchKeyword) {
                    const marks = chatBox.querySelectorAll('mark');
                    searchTotal = marks.length;
                    if (searchMatchIndex >= 0 && searchMatchIndex < marks.length) {
                        marks[searchMatchIndex].classList.add('current');
                    }
                }

                if (selectMode) { chatBox.classList.add('select-mode'); }
            }

            function addMsg(role, content) {
                const msg = {
                    role, content, id: nextId++, time: Date.now(),
                    parentId: null, history: null, historyIndex: 0, branchId: activeBranchId
                };
                messages.push(msg);
                branchMap[activeBranchId].messages = [...messages];
                renderAll();
                saveAll();
            }

            // ============= 记忆提取与图谱 =============
            async function extractAndStoreFacts(userText, aiText) {
                if (!apiKey) return;
                const prompt = `从以下对话中提取客观事实。**重要：quote 字段必须严格来自用户的原话，不能自己编造，也不能来自 AI 的回复。**
        输出 JSON 数组，每个对象包含：
        "entity": "实体名（人名/地名/事物）",
        "relation": "关系（如：去了、喜欢、买了）",
        "object": "对象（如：咖啡馆、电影）",
        "fact": "完整事实句子（第三人称）",
        "quote": "用户原话（必须从用户输入中摘录）"
        如果用户没有提供新信息，输出 []。
        对话：
        用户：${userText}
        M：${aiText}`;
                try {
                    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: 'deepseek-v4-flash',
                            messages: [{ role: 'user', content: prompt }],
                            temperature: 0.2
                        })
                    });
                    if (!res.ok) return;
                    const data = await res.json();
                    const raw = data.choices[0].message.content;
                    const match = raw.match(/\[[\s\S]*\]/);
                    if (!match) return;
                    const facts = JSON.parse(match[0]);
                    if (!facts.length) return;
                    let allFacts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
                    const newFacts = facts.filter(f => !allFacts.some(a => a.quote === f.quote));
                    if (!newFacts.length) return;
                    allFacts = [...allFacts, ...newFacts.map(f => ({ ...f, time: Date.now(), mentions: 1 }))];
                    localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(allFacts));
                    rebuildGraph();
                } catch (e) { console.warn('提取事实失败', e); }
            }

            function rebuildGraph() {
                const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
                const graph = {};
                facts.forEach(f => {
                    if (!graph[f.entity]) graph[f.entity] = [];
                    if (!graph[f.entity].some(r => r.fact === f.fact)) {
                        graph[f.entity].push({ relation: f.relation, object: f.object, fact: f.fact });
                    }
                });
                localStorage.setItem(MEMORY_GRAPH_KEY, JSON.stringify(graph));
                refreshSystemPrompt();
                renderAll();
            }

            // ============= 记忆管理面板 =============
            function renderMemoryManager() {
                const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
                const container = document.getElementById('memoryDisplay');
                if (!facts.length) {
                    container.innerHTML = '<div style="padding:12px;color:var(--text-secondary);">暂无记忆，聊天后自动提取或点击"整合旧记忆"。删除聊天时会自动清理相关记忆。</div>';
                    return;
                }
                let html = '';
                facts.forEach((f, index) => {
                    html += `
                        <div class="memory-item" data-index="${index}">
                            <div class="meta">
                                <span><strong>实体：</strong>${f.entity}</span>
                                <span><strong>关系：</strong>${f.relation}</span>
                                <span><strong>对象：</strong>${f.object}</span>
                                <span><strong>提及：</strong>${f.mentions || 1}</span>
                                <span><strong>时间：</strong>${new Date(f.time).toLocaleDateString()}</span>
                            </div>
                            <div class="fact-text" id="fact-display-${index}">${f.fact}</div>
                            <div class="fact-edit" id="fact-edit-${index}" style="display:none;">
                                <input class="memory-edit-input" id="edit-entity-${index}" value="${f.entity}" placeholder="实体">
                                <input class="memory-edit-input" id="edit-relation-${index}" value="${f.relation}" placeholder="关系">
                                <input class="memory-edit-input" id="edit-object-${index}" value="${f.object}" placeholder="对象">
                                <textarea class="memory-edit-input" id="edit-fact-${index}" rows="2" style="resize:vertical;">${f.fact}</textarea>
                            </div>
                            <div class="actions">
                                <button class="edit-btn" onclick="window.toggleEditFact(${index})">✏️ 编辑</button>
                                <button class="del-btn" onclick="window.deleteFact(${index})">🗑️ 删除</button>
                                <button class="edit-btn" id="save-edit-${index}" style="display:none;background:#4caf50;" onclick="window.saveFact(${index})">💾 保存</button>
                                <button class="edit-btn" id="cancel-edit-${index}" style="display:none;background:#888;" onclick="window.cancelEditFact(${index})">取消</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            window.toggleEditFact = function(index) {
                const display = document.getElementById(`fact-display-${index}`);
                const edit = document.getElementById(`fact-edit-${index}`);
                const saveBtn = document.getElementById(`save-edit-${index}`);
                const cancelBtn = document.getElementById(`cancel-edit-${index}`);
                if (edit.style.display === 'none') {
                    edit.style.display = 'block'; display.style.display = 'none';
                    saveBtn.style.display = 'inline-block'; cancelBtn.style.display = 'inline-block';
                } else { window.cancelEditFact(index); }
            };
            window.cancelEditFact = function(index) {
                document.getElementById(`fact-display-${index}`).style.display = 'block';
                document.getElementById(`fact-edit-${index}`).style.display = 'none';
                document.getElementById(`save-edit-${index}`).style.display = 'none';
                document.getElementById(`cancel-edit-${index}`).style.display = 'none';
            };
            window.saveFact = function(index) {
                const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
                if (index >= facts.length) return;
                const entity = document.getElementById(`edit-entity-${index}`).value.trim();
                const relation = document.getElementById(`edit-relation-${index}`).value.trim();
                const object = document.getElementById(`edit-object-${index}`).value.trim();
                const fact = document.getElementById(`edit-fact-${index}`).value.trim();
                if (!entity || !fact) { alert('实体和事实不能为空'); return; }
                facts[index] = { ...facts[index], entity, relation, object, fact };
                localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(facts));
                rebuildGraph(); renderMemoryManager(); refreshSystemPrompt(); renderAll();
            };
            window.deleteFact = function(index) {
                if (!confirm('确定删除这条记忆吗？')) return;
                const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
                if (index >= facts.length) return;
                facts.splice(index, 1);
                localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(facts));
                rebuildGraph(); renderMemoryManager(); refreshSystemPrompt(); renderAll();
            };

            function addNewFact() {
                const entity = prompt('请输入实体名（如：城月、那家咖啡馆）');
                if (!entity) return;
                const relation = prompt('请输入关系（如：去了、喜欢）') || '';
                const object = prompt('请输入对象（如：咖啡馆、电影）') || '';
                const fact = prompt('请输入完整事实句子（第三人称）');
                if (!fact) return;
                const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
                facts.push({ entity, relation, object, fact, quote: '手动添加', time: Date.now(), mentions: 1 });
                localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(facts));
                rebuildGraph(); renderMemoryManager(); refreshSystemPrompt(); renderAll();
            }

            document.getElementById('addMemoryBtn').addEventListener('click', addNewFact);
            document.getElementById('clearMemoryBtn').addEventListener('click', function() {
                if (confirm('确定清空所有自动提取的记忆吗？（不会删除聊天记录）')) {
                    localStorage.removeItem(MEMORY_FACTS_KEY);
                    localStorage.removeItem(MEMORY_GRAPH_KEY);
                    alert('记忆库已清空！');
                    refreshSystemPrompt();
                    renderAll();
                    document.getElementById('moreMenu').classList.remove('active');
                    if (document.getElementById('memoryModal').classList.contains('active')) renderMemoryManager();
                }
            });
            document.getElementById('memoryViewBtn').addEventListener('click', function() {
                renderMemoryManager();
                document.getElementById('memoryModal').classList.add('active');
            });
            document.getElementById('memoryCloseBtn').addEventListener('click', function() {
                document.getElementById('memoryModal').classList.remove('active');
            });
            document.getElementById('memoryModal').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });

            // ============= 整合旧记忆 =============
            let reprocessingPaused = false;
            let reprocessingActive = false;

            function updateProgressUI(current, total, paused = false) {
                const pd = document.getElementById('progressDisplay');
                if (total > 0) {
                    pd.style.display = 'flex';
                    document.getElementById('progressNum').textContent = current;
                    document.getElementById('progressTotal').textContent = total;
                } else { pd.style.display = 'none'; }
                document.getElementById('pauseResumeBtn').textContent = paused ? '▶️ 继续' : '⏸️ 暂停';
                const pb = document.getElementById('pauseReprocessBtn');
                if (paused) { pb.textContent = '▶️ 继续整合'; pb.style.display = 'block'; }
                else { pb.textContent = '⏸️ 暂停整合'; pb.style.display = reprocessingActive ? 'block' : 'none'; }
            }

            async function reprocessAllHistory(continueFromProgress = false) {
                if (!apiKey) { alert('请先设置 API Key'); return; }
                const non = messages.filter(m => m.role !== 'system');
                if (non.length === 0) { alert('没有历史记录'); return; }
                const pairs = [];
                for (let i = 0; i < non.length - 1; i += 2) {
                    if (non[i].role === 'user' && non[i + 1] && non[i + 1].role === 'assistant') {
                        pairs.push({ user: non[i].content, assistant: non[i + 1].content });
                    }
                }
                if (pairs.length === 0) { alert('没有找到成对的对话'); return; }
                reprocessingActive = true;
                document.getElementById('reprocessBtn').style.display = 'none';
                document.getElementById('pauseReprocessBtn').style.display = 'block';
                updateProgressUI(0, pairs.length, false);
                let count = 0;
                for (let i = 0; i < pairs.length; i++) {
                    while (reprocessingPaused) { await new Promise(r => setTimeout(r, 500)); }
                    await extractAndStoreFacts(pairs[i].user, pairs[i].assistant);
                    count = i + 1;
                    updateProgressUI(count, pairs.length, false);
                    if (i % 5 === 0) await new Promise(r => setTimeout(r, 200));
                }
                rebuildGraph();
                alert(`整合完成！共处理 ${count} 对对话。`);
                refreshSystemPrompt(); renderAll();
                reprocessingActive = false;
                document.getElementById('reprocessBtn').style.display = 'block';
                document.getElementById('pauseReprocessBtn').style.display = 'none';
                updateProgressUI(0, 0, false);
            }

            function togglePauseReprocess() {
                reprocessingPaused = !reprocessingPaused;
                updateProgressUI(
                    parseInt(document.getElementById('progressNum').textContent) || 0,
                    parseInt(document.getElementById('progressTotal').textContent) || 0,
                    reprocessingPaused
                );
            }

            document.getElementById('reprocessBtn').addEventListener('click', function() {
                document.getElementById('moreMenu').classList.remove('active');
                reprocessAllHistory(false);
            });
            document.getElementById('pauseReprocessBtn').addEventListener('click', function() {
                togglePauseReprocess();
            });
            document.getElementById('pauseResumeBtn').addEventListener('click', togglePauseReprocess);

            // ============= 发送消息（修复版） =============
            async function sendToAPI(text) {
                if (!apiKey) { addMsg('assistant', '⚠️ 请先输入 API Key'); $('setupBar').style.display = 'flex'; return; }
                const isEdit = editingIdx >= 0 && editingIdx < messages.length;
                let userMsg;

                if (isEdit) {
                    const parent = messages[editingIdx];
                    
                    // 关键修复：编辑历史消息时创建分支
                    if (editingIdx < messages.length - 1) {
                        const result = createBranch(parent.id);
                        // createBranch已经将messages截断到forkIdx
                        // 需要重新找到parent在新messages中的位置
                        const newIdx = messages.findIndex(m => m.id === parent.id);
                        if (newIdx >= 0) {
                            editingIdx = newIdx;
                        }
                    }

                    // 保存旧版本
                    if (!parent.history) {
                        const oldReply = (editingIdx + 1 < messages.length && messages[editingIdx + 1].role === 'assistant') ? messages[editingIdx + 1].content : '';
                        parent.history = [{ content: parent.content, reply: oldReply, time: parent.time }];
                        parent.historyIndex = 0;
                    } else {
                        const curReply = (editingIdx + 1 < messages.length && messages[editingIdx + 1].role === 'assistant') ? messages[editingIdx + 1].content : '';
                        if (parent.history[parent.historyIndex]) {
                            parent.history[parent.historyIndex] = { content: parent.content, reply: curReply, time: parent.time };
                        }
                    }

                    // 截断后面的消息
                    messages = messages.slice(0, editingIdx + 1);

                    // 更新消息内容
                    parent.content = text;
                    parent.time = Date.now();
                    parent.history.push({ content: text, reply: '', time: parent.time });
                    parent.historyIndex = parent.history.length - 1;
                    parent.branchId = activeBranchId;
                    branchMap[activeBranchId].messages = [...messages];
                    userMsg = parent;
                    editingIdx = -1;
                } else {
                    // 正常发送新消息
                    userMsg = {
                        role: 'user', content: text, id: nextId++, time: Date.now(),
                        parentId: null, history: null, historyIndex: 0, branchId: activeBranchId
                    };
                    const last = messages[messages.length - 1];
                    if (last && last.role !== 'system') userMsg.parentId = last.id;
                    messages.push(userMsg);
                    branchMap[activeBranchId].messages = [...messages];
                }

                renderAll();
                saveAll();

                // 显示加载动画
                const load = document.createElement('div');
                load.className = 'message-row assistant';
                load.innerHTML = '<div class="time-label">…</div><div class="bubble-row"><div class="bubble">M正在思考...</div></div>';
                chatBox.appendChild(load);
                chatBox.scrollTop = chatBox.scrollHeight;

                try {
                    refreshSystemPrompt();
                    // 只取系统提示 + 最后30条发给API
                    const recentMsgs = messages.slice(-30);
                    const apiMsgs = [messages[0], ...recentMsgs].map(m => ({
                        role: m.role,
                        content: typeof m.content === 'string' ? m.content : '[图片]'
                    }));
                    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: 'deepseek-v4-flash',
                            messages: apiMsgs,
                            stream: false,
                            temperature: 0.7
                        })
                    });
                    load.remove();
                    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `请求失败 (${res.status})`); }
                    const data = await res.json();
                    const reply = data.choices[0].message.content;
                    const aiMsg = {
                        role: 'assistant', content: reply, id: nextId++, time: Date.now(),
                        parentId: userMsg.id, branchId: activeBranchId
                    };
                    messages.push(aiMsg);
                    branchMap[activeBranchId].messages = [...messages];
                    if (userMsg.history && userMsg.history.length > 0) {
                        userMsg.history[userMsg.historyIndex].reply = reply;
                    }
                    renderAll();
                    saveAll();
                    if (data.usage) {
                        $('lastTokens').textContent = data.usage.total_tokens;
                        totalTokens += data.usage.total_tokens;
                        const cost = ((data.usage.prompt_tokens_details?.cached_tokens || 0) * 0.02 + (data.usage.prompt_tokens - (data.usage.prompt_tokens_details?.cached_tokens || 0)) * 1 + data.usage.completion_tokens * 2) / 1e6;
                        totalCost += cost;
                        $('lastCost').textContent = cost.toFixed(4);
                        updateTokenDisplay();
                        saveAll();
                    }
                    if (reply) { extractAndStoreFacts(text, reply).catch(e => console.warn(e)); }
                } catch (e) { load.remove(); addMsg('assistant', `❌ ${e.message}`); }
            }

            $('sendBtn').onclick = () => { const t = $('userInput').value.trim(); if (t) { $('userInput').value = ''; sendToAPI(t); } };
            $('userInput').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); $('sendBtn').click(); } };

            // ==================== 导出 ====================
            $('exportBtn').onclick = () => {
                const data = {
                    messages: messages.filter(m => m.role !== 'system'),
                    branchMap: branchMap,
                    activeBranchId: activeBranchId,
                    branchCounter: branchCounter
                };
                if (!data.messages.length) return alert('无记录');
                const b = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(b);
                a.download = `chat-m-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
            };

            (function auto() {
                const today = new Date().toISOString().slice(0, 10);
                if (localStorage.getItem(AEK) === today) return;
                const data = {
                    messages: messages.filter(m => m.role !== 'system'),
                    branchMap: branchMap,
                    activeBranchId: activeBranchId,
                    branchCounter: branchCounter
                };
                if (data.messages.length) {
                    const b = new Blob([JSON.stringify(data)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(b);
                    a.download = `chat-auto-${today}.json`;
                    a.click();
                    localStorage.setItem(AEK, today);
                }
            })();

            // ==================== 导入 ====================
            $('importBtn').onclick = () => { $('importModal').classList.add('active'); };
            $('importCancelBtn').onclick = () => $('importModal').classList.remove('active');
            $('importModal').onclick = e => { if (e.target === $('importModal')) $('importModal').classList.remove('active'); };
            $('importFileBtn').onclick = () => $('importFileInput').click();
            $('importJsonFileBtn').onclick = () => $('importJsonFileInput').click();
            $('importFileInput').onchange = e => { if (e.target.files[0]) { const r = new FileReader(); r.onload = ev => $('importTextarea').value = ev.target.result; r.readAsText(e.target.files[0]); } };
            $('importJsonFileInput').onchange = e => { if (e.target.files[0]) { const r = new FileReader(); r.onload = ev => $('importTextarea').value = ev.target.result; r.readAsText(e.target.files[0]); } };

            function parseText(t) {
                const lines = t.split('\n'), res = [];
                const up = ['你:', '你：', '用户:', '用户：', '我:', '我：', '问:', '问：'];
                const ap = ['M:', 'M：', '张莎:', '张莎：', '助手:', '助手：', 'assistant:', 'ai:', '答:', '答：'];
                for (let l of lines) {
                    l = l.trim(); if (!l) continue;
                    let role = null, c = ''; const lower = l.toLowerCase();
                    for (let p of up) { if (lower.startsWith(p.toLowerCase())) { role = 'user'; c = l.slice(p.length).trim(); break; } }
                    if (!role) { for (let p of ap) { if (lower.startsWith(p.toLowerCase())) { role = 'assistant'; c = l.slice(p.length).trim(); break; } } }
                    if (role && c) { res.push({ role, content: c }); }
                    else if (!role && res.length > 0) { res[res.length - 1].content += ' ' + l; }
                }
                return res;
            }

            function parseAndImport(append = false) {
                const raw = $('importTextarea').value.trim();
                if (!raw) { alert('请粘贴内容'); return; }
                let imported, branchData = null;
                try {
                    const p = JSON.parse(raw);
                    if (p.messages && Array.isArray(p.messages)) { imported = p.messages; branchData = p; }
                    else if (Array.isArray(p)) imported = p;
                    else throw 0;
                    imported = imported.filter(m => m && (m.role === 'user' || m.role === 'assistant') && typeof m.content === 'string');
                } catch (e) { imported = parseText(raw); }
                if (!imported || !imported.length) { alert('无法解析'); return; }

                const now = Date.now(), total = imported.length;
                const newMessages = imported.map((m, i) => ({
                    role: m.role, content: m.content, id: m.id || (nextId++),
                    time: m.time || (now - (total - i) * 5000), parentId: m.parentId || null,
                    history: m.history || null, historyIndex: m.historyIndex || 0,
                    branchId: m.branchId || activeBranchId
                }));
                for (let i = 0; i < newMessages.length; i++) {
                    if (!newMessages[i].parentId && i > 0) { newMessages[i].parentId = newMessages[i - 1].id; }
                }

                if (branchData) {
                    branchMap = branchData.branchMap || {};
                    activeBranchId = branchData.activeBranchId || 'branch_1';
                    branchCounter = branchData.branchCounter || 1;
                }

                if (append) {
                    const lastMsg = messages[messages.length - 1];
                    if (lastMsg && lastMsg.role !== 'system') newMessages[0].parentId = lastMsg.id;
                    messages.push(...newMessages);
                } else {
                    messages = [messages[0]];
                    messages.push(...newMessages);
                    if (!branchData) {
                        branchMap = { 'branch_1': { messages: [...messages], parentBranchId: null, parentMsgId: null } };
                        activeBranchId = 'branch_1'; branchCounter = 1;
                    }
                }
                branchMap[activeBranchId].messages = [...messages];
                saveDraft(DRAFT_IMPORT, '');
                renderAll();
                saveAll();
                alert(`${append ? '追加' : '导入'}成功（${newMessages.length} 条消息）`);
                $('importModal').classList.remove('active');
            }

            $('importConfirmBtn').onclick = () => parseAndImport(false);
            $('importAppendBtn').onclick = () => parseAndImport(true);

            // 启动
            renderAll();
            if (messages.filter(m => m.role !== 'system').length === 0) {
                addMsg('assistant', apiKey ? '你好！我是M，分支对话已加载 🌿' : '👋 请先输入 API Key');
            }
        })();
    </script>
</body>
</html>
