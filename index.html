<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>M · 智能助手</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #555;
      --border: #ddd;
      --bubble-user-bg: #1a1a2e;
      --bubble-user-text: #ffffff;
      --bubble-assistant-bg: #ffffff;
      --bubble-assistant-text: #1a1a2e;
      --button-primary-bg: #0f3460;
      --button-primary-text: #ffffff;
      --header-bg: #1a1a2e;
      --header-text: #ffffff;
      --input-bg: #ffffff;
      --input-text: #000000;
      --token-bg: #ffffff;
      --token-text: #555;
      --preview-bg: #ffffff;
      --chat-bg: #fafafa;
      --modal-overlay: rgba(0,0,0,0.5);
      --modal-bg: #ffffff;
    }
    body.dark {
      --bg: #121212;
      --surface: #1e1e1e;
      --text-primary: #e0e0e0;
      --text-secondary: #aaaaaa;
      --border: #333;
      --bubble-user-bg: #333;
      --bubble-user-text: #ffffff;
      --bubble-assistant-bg: #2a2a2a;
      --bubble-assistant-text: #e0e0e0;
      --button-primary-bg: #3a3a5c;
      --button-primary-text: #ffffff;
      --header-bg: #111;
      --header-text: #e0e0e0;
      --input-bg: #1e1e1e;
      --input-text: #e0e0e0;
      --token-bg: #1e1e1e;
      --token-text: #aaaaaa;
      --preview-bg: #1e1e1e;
      --chat-bg: #121212;
      --modal-overlay: rgba(0,0,0,0.7);
      --modal-bg: #2a2a2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 12px 16px;
      text-align: center;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-shrink: 0;
    }
    .header-buttons {
      position: absolute;
      right: 16px;
      display: flex;
      gap: 6px;
    }
    .header-buttons button {
      background: var(--button-primary-bg);
      border: none;
      color: var(--button-primary-text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .setup-bar {
      background: var(--surface);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .setup-bar input {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    .setup-bar button {
      padding: 10px 16px;
      background: var(--button-primary-bg);
      color: var(--button-primary-text);
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .token-panel {
      background: var(--token-bg);
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--token-text);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
      flex-shrink: 0;
    }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: var(--chat-bg);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      gap: 8px;
      max-width: 90%;
      animation: fadeIn 0.2s ease;
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 1rem;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
    .bubble img {
      max-width: 200px;
      border-radius: 12px;
      margin: 4px 0;
      display: block;
    }
    .user .bubble {
      background: var(--bubble-user-bg);
      color: var(--bubble-user-text);
      border-bottom-right-radius: 4px;
    }
    .assistant .bubble {
      background: var(--bubble-assistant-bg);
      color: var(--bubble-assistant-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .input-area {
      background: var(--surface);
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      resize: none;
      max-height: 120px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--input-text);
    }
    .input-area button {
      padding: 12px 16px;
      background: var(--button-primary-bg);
      color: var(--button-primary-text);
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      height: fit-content;
      white-space: nowrap;
    }
    .input-area button.img-btn { background: #533483; }
    #imagePreview {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 12px 0 12px;
      background: var(--preview-bg);
      flex-shrink: 0;
    }
    #imagePreview img {
      width: 50px; height: 50px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    #imagePreview .clear-img {
      position: absolute;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 50%;
      width: 18px; height: 18px;
      font-size: 12px; line-height: 18px;
      text-align: center;
      top: -6px; right: -6px;
      cursor: pointer;
    }
    .preview-item { position: relative; display: inline-block; }
    .tip {
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 4px;
    }

    /* 导入弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--modal-bg);
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .modal textarea {
      width: 100%;
      flex: 1;
      min-height: 150px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      background: var(--input-bg);
      color: var(--input-text);
    }
    .modal-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-import { background: #0f3460; color: white; }
    .btn-file { background: #533483; color: white; }
    .btn-cancel { background: #888; color: white; }
    .modal .format-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .bubble { font-size: 0.95rem; }
      .input-area textarea { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    🧠 M
    <div class="header-buttons">
      <button id="themeToggle">🌙</button>
      <button id="scheduleBtn">定时</button>
      <button id="exportBtn">导出</button>
      <button id="importBtn">导入</button>
    </div>
  </div>

  <div class="setup-bar" id="setupBar">
    <input type="password" id="apiKeyInput" placeholder="粘贴你的 DeepSeek API Key" autocomplete="off">
    <button id="saveKeyBtn">保存</button>
  </div>

  <div class="token-panel" id="tokenPanel">
    <span>上次：<strong id="lastTokens">0</strong> tokens / <strong id="lastCost">0.0000</strong> 元</span>
    <span>累计：<strong id="totalTokens">0</strong> tokens / <strong id="totalCost">0.0000</strong> 元</span>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div id="imagePreview"></div>

  <div class="input-area">
    <input type="file" id="imageInput" accept="image/*" style="display:none" multiple>
    <button id="imageBtn" class="img-btn">📷</button>
    <textarea id="userInput" rows="1" placeholder="输入消息..."></textarea>
    <button id="sendBtn">发送</button>
  </div>
  <div class="tip">密钥仅保存在你的手机中，不会上传</div>

  <!-- 导入弹窗 -->
  <div class="modal-overlay" id="importModal">
    <div class="modal">
      <textarea id="importTextarea" placeholder="在此粘贴聊天内容..."></textarea>
      <div class="format-hint">
        格式：每行用“你:”开头代表你说的话，“M:”或“张莎:”开头代表 M 的回复。也支持直接粘贴 JSON 数组。
      </div>
      <div class="modal-buttons">
        <button class="btn-file" id="importFileBtn">选择 TXT 文件</button>
        <button class="btn-import" id="importConfirmBtn">导入</button>
        <button class="btn-cancel" id="importCancelBtn">取消</button>
      </div>
      <input type="file" id="importFileInput" accept=".txt,text/plain" style="display:none">
    </div>
  </div>

  <script>
    (function() {
      // ---------- 存储键 ----------
      const STORAGE_KEY = 'deepseek_api_key';
      const CHAT_STORAGE_KEY = 'deepseek_chat_messages';
      const TOTAL_TOKENS_KEY = 'deepseek_total_tokens';
      const TOTAL_COST_KEY = 'deepseek_total_cost';
      const THEME_KEY = 'deepseek_theme';

      // ---------- 基础存取 ----------
      function getApiKey() { return localStorage.getItem(STORAGE_KEY) || ''; }
      function saveApiKey(key) { localStorage.setItem(STORAGE_KEY, key.trim()); }
      function hasApiKey() { return !!getApiKey(); }

      function saveMessages() {
        const toSave = messages.filter(m => m.role !== 'system');
        const textOnly = toSave.map(m => {
          if (Array.isArray(m.content)) {
            const textPart = m.content.find(p => p.type === 'text');
            return { role: m.role, content: textPart?.text || '[图片]' };
          }
          return m;
        });
        localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(textOnly));
      }

      function loadMessages() {
        const saved = localStorage.getItem(CHAT_STORAGE_KEY);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) {
              messages = [
                { role: 'system', content: '你是M，用简洁友好的方式回答问题。如果用户发了图片，请仔细描述图片内容并回答相关问题。' },
                ...parsed
              ];
              return true;
            }
          } catch(e) {}
        }
        return false;
      }

      function getTotalTokens() {
        return parseInt(localStorage.getItem(TOTAL_TOKENS_KEY) || '0');
      }
      function addTotalTokens(n) {
        const newTotal = getTotalTokens() + n;
        localStorage.setItem(TOTAL_TOKENS_KEY, newTotal);
        document.getElementById('totalTokens').textContent = newTotal;
        return newTotal;
      }
      function updateLastTokens(n) {
        document.getElementById('lastTokens').textContent = n;
      }

      function getTotalCost() {
        return parseFloat(localStorage.getItem(TOTAL_COST_KEY) || '0');
      }
      function addTotalCost(amount) {
        const newTotal = getTotalCost() + amount;
        localStorage.setItem(TOTAL_COST_KEY, newTotal.toString());
        document.getElementById('totalCost').textContent = newTotal.toFixed(4);
        return newTotal;
      }
      function updateLastCost(amount) {
        document.getElementById('lastCost').textContent = amount.toFixed(4);
      }

      function calcCost(usage) {
        const promptTokens = usage.prompt_tokens || 0;
        const completionTokens = usage.completion_tokens || 0;
        const cachedTokens = usage.prompt_tokens_details?.cached_tokens || 0;
        const uncachedPrompt = promptTokens - cachedTokens;
        return (cachedTokens * 0.02 + uncachedPrompt * 1 + completionTokens * 2) / 1_000_000;
      }

      // ---------- 主题管理 ----------
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.body.classList.add('dark');
          document.getElementById('themeToggle').textContent = '☀️';
        } else {
          document.body.classList.remove('dark');
          document.getElementById('themeToggle').textContent = '🌙';
        }
        localStorage.setItem(THEME_KEY, theme);
      }

      const themeToggle = document.getElementById('themeToggle');
      themeToggle.addEventListener('click', () => {
        const isDark = document.body.classList.contains('dark');
        applyTheme(isDark ? 'light' : 'dark');
      });

      const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
      applyTheme(savedTheme);

      // ---------- UI 元素 ----------
      const setupBar = document.getElementById('setupBar');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const saveKeyBtn = document.getElementById('saveKeyBtn');
      const chatBox = document.getElementById('chatBox');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const importBtn = document.getElementById('importBtn');
      const exportBtn = document.getElementById('exportBtn');
      const scheduleBtn = document.getElementById('scheduleBtn');
      const imageBtn = document.getElementById('imageBtn');
      const imageInput = document.getElementById('imageInput');
      const imagePreview = document.getElementById('imagePreview');

      const importModal = document.getElementById('importModal');
      const importTextarea = document.getElementById('importTextarea');
      const importFileBtn = document.getElementById('importFileBtn');
      const importFileInput = document.getElementById('importFileInput');
      const importConfirmBtn = document.getElementById('importConfirmBtn');
      const importCancelBtn = document.getElementById('importCancelBtn');

      let selectedImages = [];

      if (hasApiKey()) {
        setupBar.style.display = 'none';
        apiKeyInput.value = getApiKey();
      }

      saveKeyBtn.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (!key) { alert('请输入 API Key'); return; }
        saveApiKey(key);
        setupBar.style.display = 'none';
        addMessage('assistant', '密钥已保存 ✅ 现在可以开始和M聊天了。');
      });

      let messages = [
        { role: 'system', content: '你是M，用简洁友好的方式回答问题。如果用户发了图片，请仔细描述图片内容并回答相关问题。' }
      ];

      function renderBubble(role, content, imageUrls) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        let html = `<div class="bubble">`;
        if (imageUrls && imageUrls.length > 0) {
          imageUrls.forEach(url => {
            html += `<img src="${url}" alt="发送的图片">`;
          });
        }
        if (content) {
          html += escapeHtml(content);
        }
        html += `</div>`;
        div.innerHTML = html;
        chatBox.appendChild(div);
      }

      function addMessage(role, content, record = true, imageUrls = null) {
        renderBubble(role, content, imageUrls);
        if (record) {
          let msgObj;
          if (imageUrls && imageUrls.length > 0) {
            const parts = [];
            imageUrls.forEach(url => {
              parts.push({ type: 'image_url', image_url: { url } });
            });
            if (content) {
              parts.push({ type: 'text', text: content });
            }
            msgObj = { role, content: parts };
          } else {
            msgObj = { role, content };
          }
          messages.push(msgObj);
          saveMessages();
        }
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function escapeHtml(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function addLoadingMessage() {
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'loadingMsg';
        div.innerHTML = '<div class="bubble">M正在思考...</div>';
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function removeLoadingMessage() {
        const el = document.getElementById('loadingMsg');
        if (el) el.remove();
      }

      async function callDeepSeek(userContent, imageUrls = null) {
        const apiKey = getApiKey();
        if (!apiKey) {
          addMessage('assistant', '⚠️ 请先在上方输入 API Key');
          setupBar.style.display = 'flex';
          return;
        }

        let userMsg;
        if (imageUrls && imageUrls.length > 0) {
          const parts = [];
          imageUrls.forEach(url => {
            parts.push({ type: 'image_url', image_url: { url } });
          });
          if (userContent) {
            parts.push({ type: 'text', text: userContent });
          }
          userMsg = { role: 'user', content: parts };
        } else {
          userMsg = { role: 'user', content: userContent };
        }

        messages.push(userMsg);
        addLoadingMessage();

        try {
          const apiMessages = messages.map(m => {
            if (m.role === 'system') return m;
            if (Array.isArray(m.content)) return m;
            return { role: m.role, content: m.content };
          });

          const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-v4-flash',
              messages: apiMessages,
              stream: false,
              temperature: 0.7
            })
          });

          removeLoadingMessage();

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || `请求失败 (${response.status})`);
          }

          const data = await response.json();
          const reply = data.choices[0].message.content;
          addMessage('assistant', reply);

          if (data.usage) {
            updateLastTokens(data.usage.total_tokens);
            addTotalTokens(data.usage.total_tokens);
            const cost = calcCost(data.usage);
            updateLastCost(cost);
            addTotalCost(cost);
          }
        } catch (error) {
          removeLoadingMessage();
          addMessage('assistant', `❌ 错误: ${error.message}`);
          messages.pop();
          saveMessages();
        }
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        const hasImages = selectedImages.length > 0;
        if (!text && !hasImages) return;

        addMessage('user', text || '', true, hasImages ? selectedImages : null);
        userInput.value = '';
        userInput.style.height = 'auto';
        const imagesToSend = [...selectedImages];
        clearImages();
        await callDeepSeek(text, imagesToSend.length > 0 ? imagesToSend : null);
      }

      imageBtn.addEventListener('click', () => { imageInput.click(); });
      imageInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          const base64 = await compressAndEncode(file);
          selectedImages.push(base64);
          const item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML = `<img src="${base64}" alt="预览"><span class="clear-img" data-index="${selectedImages.length-1}">✕</span>`;
          imagePreview.appendChild(item);
        }
        imageInput.value = '';
        bindClearEvents();
      });

      function bindClearEvents() {
        document.querySelectorAll('#imagePreview .clear-img').forEach(span => {
          span.onclick = function() {
            const idx = parseInt(this.dataset.index);
            selectedImages.splice(idx, 1);
            refreshImagePreview();
          };
        });
      }

      function compressAndEncode(file, maxSize = 1024) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let w = img.width, h = img.height;
              if (Math.max(w, h) > maxSize) {
                const ratio = maxSize / Math.max(w, h);
                w = Math.floor(w * ratio);
                h = Math.floor(h * ratio);
              }
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function clearImages() {
        selectedImages = [];
        imagePreview.innerHTML = '';
      }

      function refreshImagePreview() {
        imagePreview.innerHTML = '';
        selectedImages.forEach((url, i) => {
          const item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML = `<img src="${url}" alt="预览"><span class="clear-img" data-index="${i}">✕</span>`;
          imagePreview.appendChild(item);
        });
        bindClearEvents();
      }

      let scheduledTimer = null;
      scheduleBtn.addEventListener('click', () => {
        const minutes = prompt('请输入多少分钟后让M给你发消息？（例如：5）');
        if (!minutes) return;
        const mins = parseFloat(minutes);
        if (isNaN(mins) || mins <= 0) { alert('请输入大于 0 的数字'); return; }
        const msg = prompt('请输入M要发送的消息内容：', '该休息一下啦~');
        if (!msg) return;
        if (scheduledTimer) clearTimeout(scheduledTimer);
        const ms = mins * 60 * 1000;
        scheduledTimer = setTimeout(() => {
          addMessage('assistant', msg);
          scheduledTimer = null;
        }, ms);
        addMessage('assistant', `⏰ 好的，${mins} 分钟后M会提醒你：“${msg}”`);
      });

      exportBtn.addEventListener('click', () => {
        const exportData = messages.filter(m => m.role === 'user' || m.role === 'assistant');
        if (exportData.length === 0) { alert('没有可导出的聊天记录'); return; }
        const textOnly = exportData.map(m => {
          if (Array.isArray(m.content)) {
            const textPart = m.content.find(p => p.type === 'text');
            return { role: m.role, content: textPart?.text || '[图片]' };
          }
          return { role: m.role, content: m.content };
        });
        const jsonStr = JSON.stringify(textOnly, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chat-with-m-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      importBtn.addEventListener('click', () => {
        importTextarea.value = '';
        importModal.classList.add('active');
      });

      importCancelBtn.addEventListener('click', () => {
        importModal.classList.remove('active');
      });

      importModal.addEventListener('click', (e) => {
        if (e.target === importModal) importModal.classList.remove('active');
      });

      importFileBtn.addEventListener('click', () => {
        importFileInput.click();
      });

      importFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          importTextarea.value = ev.target.result;
        };
        reader.readAsText(file, 'UTF-8');
        importFileInput.value = '';
      });

      importConfirmBtn.addEventListener('click', () => {
        const raw = importTextarea.value.trim();
        if (!raw) { alert('请粘贴内容或选择文件'); return; }

        let imported;
        try {
          imported = JSON.parse(raw);
          if (!Array.isArray(imported)) throw new Error();
        } catch {
          imported = parseTextConversation(raw);
          if (!imported || imported.length === 0) {
            alert('无法解析内容，请检查格式。\n支持 JSON 数组或用“你:”/“M:”/“张莎:”开头的文本。');
            return;
          }
        }

        const valid = imported.filter(m => m.role === 'user' || m.role === 'assistant');
        if (valid.length === 0) { alert('没有识别到有效的对话消息'); return; }

        chatBox.innerHTML = '';
        messages = [{ role: 'system', content: '你是M，用简洁友好的方式回答问题。如果用户发了图片，请仔细描述图片内容并回答相关问题。' }];
        valid.forEach(msg => addMessage(msg.role, msg.content));
        saveMessages();
        importModal.classList.remove('active');
      });

      function parseTextConversation(text) {
        const lines = text.split('\n');
        const result = [];
        const userPrefixes = ['你:', '用户:', 'user:', '我:', '问:','Q:','q:'];
        const aiPrefixes = ['M:', 'M：', '张莎:', '张莎：', '助手:', 'assistant:', 'ai:', '答:','A:','a:'];
        for (let line of lines) {
          line = line.trim();
          if (!line) continue;
          let role = null;
          let content = '';
          const lowerLine = line.toLowerCase();
          for (let p of userPrefixes) {
            if (lowerLine.startsWith(p.toLowerCase())) {
              role = 'user';
              content = line.substring(p.length).trim();
              break;
            }
          }
          if (!role) {
            for (let p of aiPrefixes) {
              if (lowerLine.startsWith(p.toLowerCase())) {
                role = 'assistant';
                content = line.substring(p.length).trim();
                break;
              }
            }
          }
          if (role && content) result.push({ role, content });
        }
        return result;
      }

      sendBtn.addEventListener('click', sendMessage);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      });

      document.getElementById('totalTokens').textContent = getTotalTokens();
      document.getElementById('totalCost').textContent = getTotalCost().toFixed(4);

      if (hasApiKey()) {
        const restored = loadMessages();
        if (restored) {
          messages.slice(1).forEach(msg => renderBubble(msg.role, typeof msg.content === 'string' ? msg.content : '[图片]'));
        } else {
          addMessage('assistant', '你好！我是M，有什么可以帮你的？');
        }
      } else {
        loadMessages();
        if (messages.length === 1) {
          addMessage('assistant', '👋 欢迎！请先粘贴你的 DeepSeek API Key 并保存。');
        } else {
          messages.slice(1).forEach(msg => renderBubble(msg.role, typeof msg.content === 'string' ? msg.content : '[图片]'));
        }
      }
    })();
  </script>
</body>
</html>
