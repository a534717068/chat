<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DeepSeek 助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }
    .header {
      background: #1a1a2e;
      color: white;
      padding: 12px 16px;
      text-align: center;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .header-buttons {
      position: absolute;
      right: 16px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .header-buttons select,
    .header-buttons button {
      background: #0f3460;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-family: inherit;
    }
    .setup-bar {
      background: white;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .setup-bar input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .setup-bar button {
      padding: 10px 16px;
      background: #16213e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      gap: 8px;
      max-width: 90%;
      animation: fadeIn 0.2s ease;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 1rem;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .user .bubble {
      background: #1a1a2e;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .assistant .bubble {
      background: white;
      color: #1a1a2e;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      background: white;
      padding: 10px 12px;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 1rem;
      resize: none;
      max-height: 120px;
      font-family: inherit;
    }
    .input-area button {
      padding: 12px 20px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      height: fit-content;
    }
    .tip {
      color: #888;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 4px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .bubble { font-size: 0.95rem; }
      .input-area textarea { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    🧠 DeepSeek 助手
    <div class="header-buttons">
      <select id="modelSelect">
        <option value="deepseek-v4-flash" selected>V4 Flash</option>
        <option value="deepseek-v4-pro">V4 Pro</option>
        <option value="deepseek-chat">V3 (Chat)</option>
        <option value="deepseek-reasoner">R1 (Reasoner)</option>
      </select>
      <button id="exportBtn">导出</button>
      <button id="importBtn">导入</button>
    </div>
  </div>

  <div class="setup-bar" id="setupBar">
    <input type="password" id="apiKeyInput" placeholder="粘贴你的 DeepSeek API Key" autocomplete="off">
    <button id="saveKeyBtn">保存</button>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="输入消息..."></textarea>
    <button id="sendBtn">发送</button>
  </div>
  <div class="tip">密钥仅保存在你的手机中，不会上传</div>

  <script>
    (function() {
      // ---------- 存储管理 ----------
      const STORAGE_KEY = 'deepseek_api_key';
      const CHAT_STORAGE_KEY = 'deepseek_chat_messages';

      function getApiKey() { return localStorage.getItem(STORAGE_KEY) || ''; }
      function saveApiKey(key) { localStorage.setItem(STORAGE_KEY, key.trim()); }
      function hasApiKey() { return !!getApiKey(); }

      // 聊天记录持久化
      function saveMessages() {
        const toSave = messages.filter(m => m.role !== 'system');
        localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(toSave));
      }

      function loadMessages() {
        const saved = localStorage.getItem(CHAT_STORAGE_KEY);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) {
              messages = [
                { role: 'system', content: '你是 DeepSeek 助手，用简洁友好的方式回答问题。' },
                ...parsed
              ];
              return true;
            }
          } catch(e) {}
        }
        return false;
      }

      // ---------- UI 元素 ----------
      const setupBar = document.getElementById('setupBar');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const saveKeyBtn = document.getElementById('saveKeyBtn');
      const chatBox = document.getElementById('chatBox');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const importBtn = document.getElementById('importBtn');
      const exportBtn = document.getElementById('exportBtn');
      const modelSelect = document.getElementById('modelSelect');

      if (hasApiKey()) {
        setupBar.style.display = 'none';
        apiKeyInput.value = getApiKey();
      }

      saveKeyBtn.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (!key) { alert('请输入 API Key'); return; }
        saveApiKey(key);
        setupBar.style.display = 'none';
        addMessage('assistant', '密钥已保存 ✅ 现在可以开始聊天了。');
      });

      // ---------- 消息处理 ----------
      let messages = [
        { role: 'system', content: '你是 DeepSeek 助手，用简洁友好的方式回答问题。' }
      ];

      function renderBubble(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
        chatBox.appendChild(div);
      }

      function addMessage(role, content, record = true) {
        renderBubble(role, content);
        if (record) {
          messages.push({ role, content });
          saveMessages();
        }
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function escapeHtml(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function addLoadingMessage() {
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'loadingMsg';
        div.innerHTML = '<div class="bubble">思考中...</div>';
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function removeLoadingMessage() {
        const el = document.getElementById('loadingMsg');
        if (el) el.remove();
      }

      // API 调用
      async function callDeepSeek(userMessage) {
        const apiKey = getApiKey();
        if (!apiKey) {
          addMessage('assistant', '⚠️ 请先在上方输入 API Key');
          setupBar.style.display = 'flex';
          return;
        }

        messages.push({ role: 'user', content: userMessage });
        addLoadingMessage();

        try {
          const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: modelSelect.value,   // 动态读取模型选择
              messages: messages.filter(m => m.role !== 'system' || m === messages[0]),
              stream: false,
              temperature: 0.7
            })
          });

          removeLoadingMessage();

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || `请求失败 (${response.status})`);
          }

          const data = await response.json();
          const reply = data.choices[0].message.content;
          addMessage('assistant', reply);
        } catch (error) {
          removeLoadingMessage();
          addMessage('assistant', `❌ 错误: ${error.message}`);
          messages.pop();
          saveMessages();
        }
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        userInput.value = '';
        userInput.style.height = 'auto';
        await callDeepSeek(text);
      }

      // ---------- 导入/导出 ----------
      // 导出
      exportBtn.addEventListener('click', () => {
        const exportData = messages.filter(m => m.role === 'user' || m.role === 'assistant');
        if (exportData.length === 0) {
          alert('没有可导出的聊天记录');
          return;
        }
        const jsonStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `deepseek-chat-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // 导入（支持纯文本自动解析）
      importBtn.addEventListener('click', () => {
        const raw = prompt('粘贴聊天内容：\n\n如果已经是 JSON 格式（[{"role":...}]），直接粘贴即可。\n\n如果是纯文本对话，请确保每行以 "你:" 或 "DeepSeek:" 开头，例如：\n你: 你好\nDeepSeek: 你好！...');
        if (!raw) return;
        let imported;
        try {
          imported = JSON.parse(raw);
          if (!Array.isArray(imported)) throw new Error();
        } catch {
          imported = parseTextConversation(raw);
          if (!imported || imported.length === 0) {
            alert('无法解析对话内容，请检查格式。\n支持 JSON 数组，或每行用 "你:" / "DeepSeek:" 开头的文本。');
            return;
          }
        }

        const valid = imported.filter(m => m.role === 'user' || m.role === 'assistant');
        if (valid.length === 0) {
          alert('没有识别到有效的对话消息');
          return;
        }

        chatBox.innerHTML = '';
        messages = [{ role: 'system', content: '你是 DeepSeek 助手，用简洁友好的方式回答问题。' }];
        valid.forEach(msg => addMessage(msg.role, msg.content));
        saveMessages();
      });

      function parseTextConversation(text) {
        const lines = text.split('\n');
        const result = [];
        const userPrefixes = ['你:', '用户:', 'user:', '我:', '问:','Q:','q:'];
        const aiPrefixes = ['deepseek:', '助手:', 'assistant:', 'ai:', '答:','A:','a:','deepseek：'];

        for (let line of lines) {
          line = line.trim();
          if (!line) continue;
          let role = null;
          let content = '';

          const lowerLine = line.toLowerCase();
          for (let p of userPrefixes) {
            if (lowerLine.startsWith(p.toLowerCase())) {
              role = 'user';
              content = line.substring(p.length).trim();
              break;
            }
          }
          if (!role) {
            for (let p of aiPrefixes) {
              if (lowerLine.startsWith(p.toLowerCase())) {
                role = 'assistant';
                content = line.substring(p.length).trim();
                break;
              }
            }
          }
          if (role && content) {
            result.push({ role, content });
          }
        }
        return result;
      }

      // ---------- 事件绑定 ----------
      sendBtn.addEventListener('click', sendMessage);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      });

      // ---------- 初始化 ----------
      if (hasApiKey()) {
        const restored = loadMessages();
        if (restored) {
          messages.slice(1).forEach(msg => renderBubble(msg.role, msg.content));
        } else {
          addMessage('assistant', '你好！我是 DeepSeek 助手，有什么可以帮你的？');
        }
      } else {
        loadMessages();
        if (messages.length === 1) {
          addMessage('assistant', '👋 欢迎！请先粘贴你的 DeepSeek API Key 并保存。');
        } else {
          messages.slice(1).forEach(msg => renderBubble(msg.role, msg.content));
        }
      }
    })();
  </script>
</body>
</html>
