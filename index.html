  <style>

    .del-submenu.active { display: flex; }

    .del-submenu button:last-child { border-bottom: none; }

    .multi-select-checkbox { display: none; margin-right: 6px; }

    body.multi-select .bubble-actions button { pointer-events: none; opacity: 0.3; }
    body.multi-select .bubble-actions button.del-btn { pointer-events: none; }
    .multi-select-bar { display: none; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 10px; justify-content: space-between; align-items: center; }
    body.multi-select .multi-select-bar { display: flex; }
    .multi-select-bar button { padding: 6px 14px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; margin: 0 4px; }
    .multi-select-bar .cancel-multi-btn { background: #888; color: white; }
    .multi-select-bar .delete-multi-btn { background: #e94560; color: white; }
    .inline-edit-input { width: 100%; padding: 10px 13px; border-radius: 16px; border: 2px solid var(--btn-bg); font-size: 0.9rem; font-family: inherit; background: var(--surface); color: var(--text-primary); resize: none; outline: none; min-height: 100px; }
    .user .inline-edit-input { background: var(--bubble-user-bg); color: var(--bubble-user-text); border-color: #4a90d9; }
    .inline-edit-hint { font-size: 0.65rem; color: var(--text-secondary); margin-top: 2px; text-align: right; }
  </style>
</head>
<body>
  <div class="header">
    <button class="memory-btn" id="memoryViewBtn">🧠 记忆</button>
    🧠 M
    <div class="header-buttons">

  </div>

        </span>
      </h3>

  <script>
    (function() {
      const $ = id => document.getElementById(id);
      const SK = 'deepseek_api_key', CK = 'deepseek_chat_v7', TK = 'deepseek_theme';
      const TRK = 'deepseek_remaining_tokens', TRC = 'deepseek_remaining_cost';
      const TKK = 'deepseek_tokens', TCK = 'deepseek_cost', AEK = 'last_auto_export';
      const SETTING_KEY = 'deepseek_global_setting', MEMORY_KEY = 'deepseek_compressed_memory';
      const FULL_HISTORY_KEY = 'deepseek_full_history';
      const DRAFT_CHAT = 'draft_chat_input', DRAFT_SETTING = 'draft_setting', DRAFT_IMPORT = 'draft_import', DRAFT_SEARCH = 'draft_search';
      const MAX_CONTEXT = 10;
      const COMPRESS_THRESHOLD = 30;
      const MEMORY_FACTS_KEY = 'memory_facts_v3', MEMORY_GRAPH_KEY = 'memory_graph_v3';
      const REPROGRESS_KEY = 'reprocess_progress_index';
      const EXTRACT_INTERVAL = 5;

      const PROMPT_PRICE = 0.000002;
      const COMPLETION_PRICE = 0.000008;
      const CACHED_PRICE = 0.000001;

      function saveDraft(key, value) { if (value) localStorage.setItem(key, value); else localStorage.removeItem(key); }
      function loadDraft(key) { return localStorage.getItem(key) || ''; }
      function bindDraft(inputEl, draftKey) { if (!inputEl) return; const saved = loadDraft(draftKey); if (saved && !inputEl.value) inputEl.value = saved; inputEl.addEventListener('input', () => saveDraft(draftKey, inputEl.value)); }

      let extractCounter = parseInt(localStorage.getItem('extract_counter') || '0');

      let weatherCache = { desc: '获取中...', emoji: '🌤️', city: '' };
      async function fetchRealWeather() {
        try {
          const cached = localStorage.getItem('deepseek_weather_cache');
          if (cached) { const p = JSON.parse(cached); if (Date.now() - p.time < 30*60*1000) { weatherCache = p.data; updateEnvDisplay(); return; } }
          let pos; try { pos = await new Promise((r, e) => navigator.geolocation.getCurrentPosition(r, e, { timeout: 5000 })); } catch (geoErr) { console.warn('无法获取位置', geoErr); if (cached) { weatherCache = JSON.parse(cached).data; updateEnvDisplay(); } else { weatherCache = { desc: '（天气信息未获取到，请以实际为准）', emoji: '🌤️', city: '' }; updateEnvDisplay(); } return; }
          const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 8000);

        if (multiSelectMode) exitMultiSelectMode();
      }

      window._regenMsg = function(idx) { const msg=messages[idx]; if (!msg||msg.role!=='assistant') return; let ui=-1; for (let i=idx-1;i>=0;i--) if (messages[i].role==='user') { ui=i; break; } if (ui===-1) return; const text=typeof messages[ui].content==='string'?messages[ui].content:''; messages=messages.slice(0,idx); editingIdx = -1; renderAll(); saveAll(); sendToAPI(text); };

      function formatAssistantContent(content) {
        if (!content) return content;
        if (content.match(/\n.*\n/)) return content.trim();
        let result = content
          .replace(/([^\n])(\u201C)/g, '$1\n$2')
          .replace(/(\u201D)([^\s\n])/g, '$1\n$2')
          .replace(/\n{3,}/g, '\n\n');
        return result.trim();
      }

      // ========== 核心：构建 API 消息（环境消息放在历史与最新问题之间，保证缓存） ==========
      function getApiMessages() {
        refreshSystemPrompt();
        const systemMsg = messages[0];
        const nonSystem = messages.filter(m => m.role !== 'system');
        
        let history = [];
        let latestUser = null;
        
        // 把最新的一条用户消息单独拿出来
        if (nonSystem.length > 0 && nonSystem[nonSystem.length - 1].role === 'user') {
          latestUser = nonSystem[nonSystem.length - 1];
          history = nonSystem.slice(0, -1);
        } else {
          history = nonSystem;
        }

        // 截取上下文（保留最近 MAX_CONTEXT 轮）
        let contextHistory = history;
        if (contextHistory.length > MAX_CONTEXT) {
          const recent = contextHistory.slice(-MAX_CONTEXT);
          const older = contextHistory.slice(0, -MAX_CONTEXT);
          if (older.length > 0 && compressedMemory) {
            const summaryMsg = { role: 'system', content: `【之前的对话摘要】\n${compressedMemory}` };
            contextHistory = [summaryMsg, ...recent];
          } else {
            contextHistory = recent;
          }
        }

        // 构造环境消息
        const envMsg = {
          role: 'user',
          content: getFullEnvString() + '\n（以上为当前准确的时间和天气，请在所有回答中遵循这个时间/天气背景。）'
        };

        // 最终顺序：System → 历史 → 环境消息 → 最新用户问题
        const result = [systemMsg, ...contextHistory];
        result.push(envMsg);
        if (latestUser) {
          result.push(latestUser);
        }
        return result;
      }

      // 统一渲染
      function renderAll(skipScroll = false) {

        messages.forEach((msg, idx) => {

          const timeStr = formatTime(msg.time || Date.now());

          if (msg.role === 'assistant') { content = formatAssistantContent(content); }
          if (searchKeyword) { const escaped = searchKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); content = content.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>'); }

          let verHTML = '';

            verHTML = `<div class="version-switcher"><button onclick="_switchVer(${idx}, -1)" ${cur===1?'disabled':''}>◀</button><span>${cur}/${total}</span><button onclick="_switchVer(${idx}, 1)" ${cur===total?'disabled':''}>▶</button><button class="branch-del-btn" onclick="_deleteBranches(${idx})" title="删除其他分支">🗑</button></div>`;

          if (currentInlineEditIdx === idx && msg.role === 'user') {

          row.innerHTML = `<div class="time-label">${timeStr}</div><div class="bubble-row">${checkboxHTML}<div class="bubble-actions">${btns}</div><div class="bubble">${content}</div></div>${verHTML}`;

        if (multiSelectMode) {

      function addMsg(role, content) { const msg = { role, content, id: nextId++, time: Date.now(), parentId: null, history: null, historyIndex: 0 }; messages.push(msg); fullHistory.push({ role, content, time: msg.time }); saveFullHistory(); renderAll(); saveAll(); }

      function getNonSystemMessages() { return messages.filter(m => m.role !== 'system'); }

      // 压缩历史
      async function compressHistoryIfNeeded() {
        const non = getNonSystemMessages();
        if (non.length <= COMPRESS_THRESHOLD) return;
        const old = non.slice(0, non.length - MAX_CONTEXT);
        if (old.length < 10) return;
        const text = old.map(m => `${m.role==='user'?'城月':'M'}：${typeof m.content==='string'?m.content:''}`).join('\n');
        try {
          if (apiKey) {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
              method:'POST',
              headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
              body:JSON.stringify({
                model:'deepseek-v4-flash',
                messages:[
                  {role:'system',content:'请压缩对话为摘要（500字以内），只保留关键信息。'},
                  {role:'user',content:`请压缩：\n${text}`}
                ],
                stream:false,
                temperature:0.3,
                max_tokens:600
              })
            });
            if (res.ok) {
              const d = await res.json();
              const s = d.choices[0].message.content.trim();
              compressedMemory = compressedMemory ? compressedMemory+'\n'+s : s;
              if (compressedMemory.length>5000) compressedMemory = compressedMemory.slice(-5000);
              localStorage.setItem(MEMORY_KEY, compressedMemory);
              refreshSystemPrompt();
              saveAll();
              return;
            }
          }
        } catch(e) { console.warn('压缩失败', e); }
      }

      // 记忆提取
      async function extractAndStoreFacts(userText, aiText) {
        if (!apiKey) return;
        extractCounter++;
        localStorage.setItem('extract_counter', extractCounter.toString());
        if (extractCounter % EXTRACT_INTERVAL !== 0) return;
        const lastExtract = localStorage.getItem('last_extract_time_v3');
        if (lastExtract && Date.now() - parseInt(lastExtract) < 5000) await new Promise(r => setTimeout(r, 300));
        localStorage.setItem('last_extract_time_v3', Date.now().toString());
        const prompt = `从以下对话中提取客观事实。**重要：quote 字段必须严格来自用户的原话，不能自己编造，也不能来自 AI 的回复。**
        输出 JSON 数组，每个对象包含：
        "entity": "实体名（人名/地名/事物）",
        "relation": "关系（如：去了、喜欢、买了）",
        "object": "对象（如：咖啡馆、电影）",
        "fact": "完整事实句子（第三人称）",
        "quote": "用户原话（必须从用户输入中摘录）"
        如果用户没有提供新信息，输出 []。
        对话：用户：${userText}\nM：${aiText}`;
        try {
          const res = await fetch('https://api.deepseek.com/v1/chat/completions', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`}, body: JSON.stringify({model:'deepseek-v4-flash', messages:[{role:'user',content:prompt}], temperature:0.2}) });
          if (!res.ok) return;
          const data = await res.json();
          if (data.usage) { 
            remainingTokens = Math.max(0, remainingTokens - data.usage.total_tokens);
            const promptTokens = data.usage.prompt_tokens;
            const completionTokens = data.usage.completion_tokens;
            const cachedTokens = data.usage.prompt_tokens_details?.cached_tokens || 0;
            const promptCost = (promptTokens - cachedTokens) * PROMPT_PRICE + cachedTokens * CACHED_PRICE;
            const completionCost = completionTokens * COMPLETION_PRICE;
            const cost = promptCost + completionCost;
            remainingCost = Math.max(0, remainingCost - cost);
            updateTokenDisplay();
            saveAll();
          }
          const raw = data.choices[0].message.content; const match = raw.match(/\[[\s\S]*\]/); if (!match) return;
          const facts = JSON.parse(match[0]); if (!facts.length) return;
          let allFacts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
          const newFacts = facts.filter(f => !allFacts.some(a => a.quote === f.quote));
          if (!newFacts.length) return;
          allFacts = [...allFacts, ...newFacts.map(f => ({...f, time: Date.now(), mentions: 1}))];
          localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(allFacts));
          rebuildGraph();
        } catch(e) { console.warn('提取事实失败', e); }
      }

      function rebuildGraph() {
        const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
        const graph = {};
        facts.forEach(f => { if (!graph[f.entity]) graph[f.entity] = []; if (!graph[f.entity].some(r => r.fact === f.fact)) graph[f.entity].push({ relation: f.relation, object: f.object, fact: f.fact }); });
        localStorage.setItem(MEMORY_GRAPH_KEY, JSON.stringify(graph));
        refreshSystemPrompt(); renderAll();
      }

      // ========== 合并重复记忆 ==========
      function mergeDuplicateFacts() {
        let facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
        if (!facts.length) { alert('没有记忆可合并'); return; }
        const map = new Map();
        for (const f of facts) {
          const key = `${f.entity}|${f.relation}|${f.object}`;
          if (map.has(key)) {
            const existing = map.get(key);
            existing.mentions = (existing.mentions || 1) + (f.mentions || 1);
            existing.time = Math.max(existing.time, f.time);
            if (f.fact.length > existing.fact.length) existing.fact = f.fact;
          } else {
            map.set(key, { ...f });
          }
        }
        const merged = Array.from(map.values());
        if (merged.length === facts.length) { alert('没有重复记忆需要合并'); return; }
        localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(merged));
        rebuildGraph();
        renderMemoryManager();
        alert(`合并完成！记忆从 ${facts.length} 条减少到 ${merged.length} 条。`);
      }

      // ========== 遗忘机制 ==========
      function forgetFacts() {
        const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
        if (!facts.length) { alert('没有记忆可遗忘'); return; }
        const choice = prompt(
          '请选择遗忘方式（输入数字）：\n1. 按提及次数（少于 N 次）\n2. 按时间（超过 N 天未更新）\n3. 两者都执行（交集）',
          '3'
        );
        if (!choice) return;
        let byMentions = false, byDays = false;
        if (choice === '1') byMentions = true;
        else if (choice === '2') byDays = true;
        else if (choice === '3') { byMentions = true; byDays = true; }
        else { alert('无效选项'); return; }

        let thresholdMentions = 2, thresholdDays = 30;
        if (byMentions) {
          const input = prompt(`请输入提及次数阈值（小于此值将被删除）：`, '2');
          if (input !== null) thresholdMentions = parseInt(input) || 2;
        }
        if (byDays) {
          const input = prompt(`请输入天数阈值（超过此天数未更新的将被删除）：`, '30');
          if (input !== null) thresholdDays = parseInt(input) || 30;
        }

        const now = Date.now();
        const filtered = facts.filter(f => {
          let keep = true;
          if (byMentions && (f.mentions || 1) < thresholdMentions) keep = false;
          if (byDays && (now - f.time) > thresholdDays * 24 * 3600 * 1000) keep = false;
          return keep;
        });

        if (filtered.length === facts.length) { alert('没有记忆被遗忘'); return; }
        if (!confirm(`将删除 ${facts.length - filtered.length} 条记忆，确定吗？`)) return;
        localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(filtered));
        rebuildGraph();
        renderMemoryManager();
        alert(`遗忘完成！剩余 ${filtered.length} 条记忆。`);
      }

      function renderMemoryManager() {
        const facts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
        const container = document.getElementById('memoryDisplay');
        if (!facts.length) { container.innerHTML = '<div style="padding:12px;color:var(--text-secondary);">暂无记忆，聊天后自动提取或点击“开始整合”。</div>'; return; }
        let html = '';
        facts.forEach((f, index) => { html += `<div class="memory-item" data-index="${index}"><div class="meta"><span><strong>实体：</strong>${f.entity}</span><span><strong>关系：</strong>${f.relation}</span><span><strong>对象：</strong>${f.object}</span><span><strong>提及：</strong>${f.mentions || 1}</span><span><strong>时间：</strong>${new Date(f.time).toLocaleDateString()}</span></div><div class="fact-text" id="fact-display-${index}">${f.fact}</div><div class="fact-edit" id="fact-edit-${index}" style="display:none;"><input class="memory-edit-input" id="edit-entity-${index}" value="${f.entity}" placeholder="实体"><input class="memory-edit-input" id="edit-relation-${index}" value="${f.relation}" placeholder="关系"><input class="memory-edit-input" id="edit-object-${index}" value="${f.object}" placeholder="对象"><textarea class="memory-edit-input" id="edit-fact-${index}" rows="2" style="resize:vertical;">${f.fact}</textarea></div><div class="actions"><button class="edit-btn" onclick="window.toggleEditFact(${index})">✏️ 编辑</button><button class="del-btn" onclick="window.deleteFact(${index})">🗑️ 删除</button><button class="edit-btn" id="save-edit-${index}" style="display:none;background:#4caf50;" onclick="window.saveFact(${index})">💾 保存</button><button class="edit-btn" id="cancel-edit-${index}" style="display:none;background:#888;" onclick="window.cancelEditFact(${index})">取消</button></div></div>`; });
        container.innerHTML = html;
      }

      document.getElementById('memoryModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });

      // 整合旧历史
      let reprocessingPaused = false, reprocessingActive = false;
      function updateProgressUI(current, total, paused = false) {
        const progressDiv = document.getElementById('progressDisplay');
        if (total > 0) { progressDiv.style.display = 'flex'; document.getElementById('progressNum').textContent = current; document.getElementById('progressTotal').textContent = total; } else progressDiv.style.display = 'none';
        const btn = document.getElementById('pauseResumeBtn'); btn.textContent = paused ? '▶️ 继续' : '⏸️ 暂停';
        const pauseBtn = document.getElementById('pauseReprocessBtn');

      }
      async function reprocessAllHistory(continueFromProgress = false) {
        if (!apiKey) { alert('请先设置 API Key'); return; }
        const savedIndex = parseInt(localStorage.getItem(REPROGRESS_KEY) || '0');
        if (!continueFromProgress && savedIndex > 0) { if (!confirm(`检测到上次整合在 ${savedIndex} 条处中断，是否继续？\n（选“取消”将从头开始）`)) localStorage.removeItem(REPROGRESS_KEY); else continueFromProgress = true; }
        const history = JSON.parse(localStorage.getItem(FULL_HISTORY_KEY) || '[]');
        if (history.length === 0) { alert('没有历史记录'); return; }
        const pairs = []; let i = 0;
        while (i < history.length) { if (history[i].role === 'user' && i+1 < history.length && history[i+1].role === 'assistant') { pairs.push({ user: history[i].content, assistant: history[i+1].content }); i += 2; } else i++; }
        if (pairs.length === 0) { alert('没有找到成对的对话'); return; }
        let startIndex = continueFromProgress ? parseInt(localStorage.getItem(REPROGRESS_KEY) || '0') : 0;
        if (startIndex >= pairs.length) { alert('所有对话已整合完毕，无需重复。如需重新整合，请先清空记忆库。'); localStorage.removeItem(REPROGRESS_KEY); return; }
        reprocessingActive = true; reprocessingPaused = false;
        document.getElementById('reprocessBtn').style.display = 'none'; document.getElementById('pauseReprocessBtn').style.display = 'block';
        updateProgressUI(startIndex, pairs.length, false);
        const existingFacts = JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]');
        const existingQuotes = new Set(existingFacts.map(f => f.quote));
        let count = startIndex;
        for (let idx = startIndex; idx < pairs.length; idx++) {
          while (reprocessingPaused) { await new Promise(r => setTimeout(r, 500)); if (!reprocessingActive) return; }
          const pair = pairs[idx];
          if (!existingQuotes.has(pair.user)) {
            await extractAndStoreFacts(pair.user, pair.assistant);
          } else {
            console.log(`跳过已存在的quote: ${pair.user}`);
          }
          count = idx + 1;
          localStorage.setItem(REPROGRESS_KEY, count.toString());
          updateProgressUI(count, pairs.length, false);
          if (idx % 5 === 0) await new Promise(r => setTimeout(r, 200));
        }
        localStorage.removeItem(REPROGRESS_KEY); rebuildGraph();
        alert(`整合完成！共处理 ${count} 对对话。可在记忆面板中查看/编辑。`);
        refreshSystemPrompt(); renderAll(); reprocessingActive = false;
        document.getElementById('reprocessBtn').style.display = 'block'; document.getElementById('pauseReprocessBtn').style.display = 'none';
        updateProgressUI(0, 0, false);
      }
      function togglePauseReprocess() { if (!reprocessingActive) return; reprocessingPaused = !reprocessingPaused; updateProgressUI(parseInt(localStorage.getItem(REPROGRESS_KEY) || '0'), parseInt(document.getElementById('progressTotal').textContent) || 0, reprocessingPaused); document.getElementById('pauseReprocessBtn').textContent = reprocessingPaused ? '▶️ 继续整合' : '⏸️ 暂停整合'; }
      document.getElementById('reprocessBtn').addEventListener('click', function() { document.getElementById('moreMenu').classList.remove('active'); const saved = localStorage.getItem(REPROGRESS_KEY); if (saved && parseInt(saved) > 0) { if (confirm(`有未完成的整合任务（进度 ${saved} 条），是否继续？\n（点“取消”将从头开始）`)) { reprocessAllHistory(true); return; } else localStorage.removeItem(REPROGRESS_KEY); } reprocessAllHistory(false); });
      document.getElementById('pauseReprocessBtn').addEventListener('click', function() { document.getElementById('moreMenu').classList.remove('active'); togglePauseReprocess(); });
      document.getElementById('pauseResumeBtn').addEventListener('click', togglePauseReprocess);

      // 发送消息
      async function sendToAPI(text) {
        if (!apiKey) { addMsg('assistant', '⚠️ 请先输入 API Key'); $('setupBar').style.display = 'flex'; return; }
        const isValidEdit = editingIdx >= 0 && editingIdx < messages.length && messages[editingIdx].role === 'user';
        let userMsg;
        if (isValidEdit) {
          const parent = messages[editingIdx];
          if (!parent.history) {
            const oldReply = (editingIdx+1 < messages.length && messages[editingIdx+1].role === 'assistant') ? messages[editingIdx+1].content : '';
            parent.history = [{ content: parent.content, reply: oldReply, time: parent.time }];
            parent.historyIndex = 0;
          } else {
            const curReply = (editingIdx+1 < messages.length && messages[editingIdx+1].role === 'assistant') ? messages[editingIdx+1].content : '';
            parent.history[parent.historyIndex] = { content: parent.content, reply: curReply, time: parent.time };
          }
          messages = messages.slice(0, editingIdx + 1);
          parent.content = text;
          parent.time = Date.now();
          parent.history.push({ content: text, reply: '', time: parent.time });
          parent.historyIndex = parent.history.length - 1;
          userMsg = parent;
          editingIdx = -1;
        } else {
          editingIdx = -1;
          userMsg = { role: 'user', content: text, id: nextId++, time: Date.now(), parentId: null, history: null, historyIndex: 0 };
          const last = messages[messages.length - 1];
          if (last && last.role !== 'system') userMsg.parentId = last.id;
          messages.push(userMsg);
        }
        fullHistory.push({ role: 'user', content: text, time: userMsg.time }); saveFullHistory(); renderAll(); saveAll();
        saveDraft(DRAFT_CHAT, '');
        const load = document.createElement('div'); load.className = 'message-row assistant'; load.innerHTML = '<div class="time-label">…</div><div class="bubble-row"><div class="bubble">M正在思考...</div></div>'; chatBox.appendChild(load); chatBox.scrollTop = chatBox.scrollHeight;
        try {
          refreshSystemPrompt();
          const apiMsgs = getApiMessages().map(m => ({ role: m.role, content: typeof m.content === 'string' ? m.content : '[图片]' }));
          const res = await fetch('https://api.deepseek.com/v1/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify({ model: 'deepseek-v4-flash', messages: apiMsgs, stream: false, temperature: 0.5 }) });
          load.remove();
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `请求失败 (${res.status})`); }
          const data = await res.json();
          const reply = data.choices[0].message.content;
          const aiMsg = { role: 'assistant', content: reply, id: nextId++, time: Date.now(), parentId: userMsg.id };
          messages.push(aiMsg);
          fullHistory.push({ role: 'assistant', content: reply, time: aiMsg.time });
          saveFullHistory();
          if (userMsg.history && userMsg.history.length > 0) userMsg.history[userMsg.historyIndex].reply = reply;
          renderAll(); saveAll();
          if (data.usage) {
            $('lastTokens').textContent = data.usage.total_tokens;
            const promptTokens = data.usage.prompt_tokens;
            const completionTokens = data.usage.completion_tokens;
            const cachedTokens = data.usage.prompt_tokens_details?.cached_tokens || 0;
            const promptCost = (promptTokens - cachedTokens) * PROMPT_PRICE + cachedTokens * CACHED_PRICE;
            const completionCost = completionTokens * COMPLETION_PRICE;
            const cost = promptCost + completionCost;
            $('lastCost').textContent = cost.toFixed(6);
            remainingTokens = Math.max(0, remainingTokens - data.usage.total_tokens);
            remainingCost = Math.max(0, remainingCost - cost);
            updateTokenDisplay(); saveAll();
          }
          if (reply) { extractAndStoreFacts(text, reply).catch(e => console.warn(e)); }
          await compressHistoryIfNeeded();
        } catch(e) { load.remove(); addMsg('assistant', `❌ ${e.message}`); }
      }

      $('sendBtn').onclick = () => { const t = $('userInput').value.trim(); if (t) { $('userInput').value = ''; sendToAPI(t); } };
      $('userInput').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); $('sendBtn').click(); } };
      
      $('exportBtn').onclick = () => {
        const dataToExport = fullHistory.length > 0 ? fullHistory : messages.filter(m => m.role !== 'system').map(m => ({
          role: m.role,
          content: m.content,
          time: m.time || Date.now()
        }));
        if (!dataToExport.length) return alert('无记录');
        const exportData = {
          messages: dataToExport.map(m => ({
            role: m.role,
            content: m.content,
            time: m.time,
            formattedTime: fullDateTime(m.time || Date.now())
          })),
          globalSetting: globalSetting || '',
          memoryFacts: JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]')
        };
        const b = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = `chat-m-${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
        a.click();
      };

      (function auto() {
        const today = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
        if (localStorage.getItem(AEK) === today) return;
        const d = fullHistory.length > 0 ? fullHistory : messages.filter(m => m.role !== 'system');
        if (d.length) {
          const exportData = {
            messages: d.map(m => ({
              role: m.role,
              content: m.content,
              time: m.time || Date.now(),
              formattedTime: fullDateTime(m.time || Date.now())
            })),
            globalSetting: globalSetting || '',
            memoryFacts: JSON.parse(localStorage.getItem(MEMORY_FACTS_KEY) || '[]')
          };
          const b = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(b);
          a.download = `chat-auto-${today}.json`;
          a.click();
          localStorage.setItem(AEK, today);
        }
      })();

      $('importBtn').onclick = () => { $('importModal').classList.add('active'); };
      $('importCancelBtn').onclick = () => $('importModal').classList.remove('active'); $('importModal').onclick = e => { if (e.target === $('importModal')) $('importModal').classList.remove('active'); };
      $('importFileBtn').onclick = () => $('importFileInput').click(); $('importJsonFileBtn').onclick = () => $('importJsonFileInput').click();
      $('importFileInput').onchange = e => { if (e.target.files[0]) { const r = new FileReader(); r.onload = ev => $('importTextarea').value = ev.target.result; r.readAsText(e.target.files[0]); } };
      $('importJsonFileInput').onchange = e => { if (e.target.files[0]) { const r = new FileReader(); r.onload = ev => $('importTextarea').value = ev.target.result; r.readAsText(e.target.files[0]); } };

      function parseText(t) {
        const lines = t.split('\n'), res = [];
        const up = ['你:', '你：', '用户:', '用户：', '我:', '我：', '问:', '问：'];
        const ap = ['M:', 'M：', '张莎:', '张莎：', '助手:', '助手：', 'assistant:', 'ai:', '答:', '答：'];
        for (let l of lines) {
          l = l.trim(); if (!l) continue;
          let role = null, c = '';
          const lower = l.toLowerCase();
          for (let p of up) { if (lower.startsWith(p.toLowerCase())) { role = 'user'; c = l.slice(p.length).trim(); break; } }
          if (!role) { for (let p of ap) { if (lower.startsWith(p.toLowerCase())) { role = 'assistant'; c = l.slice(p.length).trim(); break; } } }
          if (role && c) { res.push({ role, content: c }); }
          else if (!role && res.length > 0) { res[res.length - 1].content += ' ' + l; }
        }
        return res;
      }

      function parseAndImport(append = false) {
        const raw = $('importTextarea').value.trim();
        if (!raw) { alert('请粘贴内容'); return; }
        let imported;
        try {
          imported = JSON.parse(raw);
          if (!imported || typeof imported !== 'object') throw 0;
          if (imported.messages && Array.isArray(imported.messages)) {
            if (imported.globalSetting && typeof imported.globalSetting === 'string') {
              globalSetting = imported.globalSetting;
              localStorage.setItem(SETTING_KEY, globalSetting);
              $('settingTextarea').value = globalSetting;
              refreshSystemPrompt();
            }
            if (imported.memoryFacts && Array.isArray(imported.memoryFacts)) {
              localStorage.setItem(MEMORY_FACTS_KEY, JSON.stringify(imported.memoryFacts));
              rebuildGraph();
            }
            imported = imported.messages;
          }
          if (!Array.isArray(imported)) throw 0;
          imported = imported.filter(m => m && typeof m === 'object' && (m.role === 'user' || m.role === 'assistant') && typeof m.content === 'string');
        } catch(e) {
          imported = parseText(raw);
        }
        if (!imported || !imported.length) { alert('无法解析'); return; }
        const now = Date.now(), total = imported.length;
        const newMessages = imported.map((m, i) => ({
          role: m.role,
          content: m.content,
          id: nextId++,
          time: m.time || (now - (total - i) * 5000),
          parentId: null,
          history: m.history || null,
          historyIndex: m.historyIndex || 0
        }));
        for (let i = 0; i < newMessages.length; i++) { if (i > 0) newMessages[i].parentId = newMessages[i - 1].id; }
        if (!append) {
          const existingSignatures = new Set(
            messages.filter(m => m.role !== 'system').map(m => `${m.role}|${m.content}|${m.time || ''}`)
          );
          const filtered = newMessages.filter(m => !existingSignatures.has(`${m.role}|${m.content}|${m.time || ''}`));
          if (filtered.length === 0) {
            alert('没有新消息，所有消息均已存在。');
            $('importModal').classList.remove('active');
            return;
          }
          messages = [messages[0], ...filtered];
          fullHistory = filtered.map(m => ({ role: m.role, content: m.content, time: m.time }));
        } else {
          const lastMsg = messages[messages.length - 1];
          if (lastMsg && lastMsg.role !== 'system') newMessages[0].parentId = lastMsg.id;
          const existingSigs = new Set(
            messages.filter(m => m.role !== 'system').map(m => `${m.role}|${m.content}|${m.time || ''}`)
          );
          const trulyNew = newMessages.filter(m => !existingSigs.has(`${m.role}|${m.content}|${m.time || ''}`));
          messages.push(...trulyNew);
          fullHistory.push(...trulyNew.map(m => ({ role: m.role, content: m.content, time: m.time })));
        }
        saveFullHistory(); renderAll(); saveAll(); saveDraft(DRAFT_IMPORT, '');
        alert(`${append ? '追加' : '导入'}成功`);
        $('importModal').classList.remove('active');
      }
      $('importConfirmBtn').onclick = () => parseAndImport(false);
      $('importAppendBtn').onclick = () => parseAndImport(true);

      renderAll(); if (messages.length <= 1) addMsg('assistant', apiKey ? '你好！我是M，精简人设已加载 🧠' : '👋 请先输入 API Key');
    })();
  </script>
