<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DeepSeek 助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }
    .header {
      background: #1a1a2e;
      color: white;
      padding: 12px 16px;
      text-align: center;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    #importBtn {
      background: #e94560;
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      position: absolute;
      right: 16px;
    }
    .setup-bar {
      background: white;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .setup-bar input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .setup-bar button {
      padding: 10px 16px;
      background: #16213e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      gap: 8px;
      max-width: 90%;
      animation: fadeIn 0.2s ease;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 1rem;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .user .bubble {
      background: #1a1a2e;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .assistant .bubble {
      background: white;
      color: #1a1a2e;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      background: white;
      padding: 10px 12px;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 1rem;
      resize: none;
      max-height: 120px;
      font-family: inherit;
    }
    .input-area button {
      padding: 12px 20px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      height: fit-content;
    }
    .tip {
      color: #888;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 4px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .bubble { font-size: 0.95rem; }
      .input-area textarea { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    🧠 DeepSeek 助手
    <button id="importBtn">导入</button>
  </div>

  <div class="setup-bar" id="setupBar">
    <input type="password" id="apiKeyInput" placeholder="粘贴你的 DeepSeek API Key" autocomplete="off">
    <button id="saveKeyBtn">保存</button>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="输入消息..."></textarea>
    <button id="sendBtn">发送</button>
  </div>
  <div class="tip">密钥仅保存在你的手机中，不会上传</div>

  <script>
    (function() {
      // ---------- 存储管理 ----------
      const STORAGE_KEY = 'deepseek_api_key';
      const CHAT_STORAGE_KEY = 'deepseek_chat_messages';

      function getApiKey() { return localStorage.getItem(STORAGE_KEY) || ''; }
      function saveApiKey(key) { localStorage.setItem(STORAGE_KEY, key.trim()); }
      function hasApiKey() { return !!getApiKey(); }

      // 聊天记录持久化
      function saveMessages() {
        const toSave = messages.filter(m => m.role !== 'system');
        localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(toSave));
      }

      function loadMessages() {
        const saved = localStorage.getItem(CHAT_STORAGE_KEY);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) {
              messages = [
                { role: 'system', content: '你是 DeepSeek 助手，用简洁友好的方式回答问题。' },
                ...parsed
              ];
              return true;
            }
          } catch(e) {}
        }
        return false;
      }

      // ---------- UI 元素 ----------
      const setupBar = document.getElementById('setupBar');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const saveKeyBtn = document.getElementById('saveKeyBtn');
      const chatBox = document.getElementById('chatBox');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const importBtn = document.getElementById('importBtn');

      // 密钥栏显示控制
      if (hasApiKey()) {
        setupBar.style.display = 'none';
        apiKeyInput.value = getApiKey();
      }

      saveKeyBtn.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (!key) { alert('请输入 API Key'); return; }
        saveApiKey(key);
        setupBar.style.display = 'none';
        addMessage('assistant', '密钥已保存 ✅ 现在可以开始聊天了。');
      });

      // ---------- 消息处理 ----------
      let messages = [
        { role: 'system', content: '你是 DeepSeek 助手，用简洁友好的方式回答问题。' }
      ];

      function renderBubble(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
        chatBox.appendChild(div);
      }

      function addMessage(role, content, record = true) {
        renderBubble(role, content);
        if (record) {
          messages.push({ role, content });
          saveMessages();
        }
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function escapeHtml(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function addLoadingMessage() {
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'loadingMsg';
        div.innerHTML = '<div class="bubble">思考中...</div>';
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function removeLoadingMessage() {
        const el = document.getElementById('loadingMsg');
        if (el) el.remove();
      }

      // API 调用
      async function callDeepSeek(userMessage) {
        const apiKey = getApiKey();
        if (!apiKey) {
          addMessage('assistant', '⚠️ 请先在上方输入 API Key');
          setupBar.style.display = 'flex';
          return;
        }

        messages.push({ role: 'user', content: userMessage });
        addLoadingMessage();

        try {
          const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: messages.filter(m => m.role !== 'system' || m === messages[0]),
              stream: false,
              temperature: 0.7
            })
          });

          removeLoadingMessage();

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || `请求失败 (${response.status})`);
          }

          const data = await response.json();
          const reply = data.choices[0].message.content;
          addMessage('assistant', reply);
        } catch (error) {
          removeLoadingMessage();
          addMessage('assistant', `❌ 错误: ${error.message}`);
          messages.pop(); // 移除发送失败的用户消息
          saveMessages();
        }
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        userInput.value = '';
        userInput.style.height = 'auto';
        await callDeepSeek(text);
      }

      // 导入聊天记录
      importBtn.addEventListener('click', () => {
        const jsonStr = prompt('请粘贴你的聊天记录 JSON（数组格式，例如 [{"role":"user","content":"你好"},...]）');
        if (!jsonStr) return;
        try {
          const imported = JSON.parse(jsonStr);
          if (!Array.isArray(imported)) throw new Error('必须是数组');
          // 清空界面和 messages
          chatBox.innerHTML = '';
          messages = [{ role: 'system', content: '你是 DeepSeek 助手，用简洁友好的方式回答问题。' }];
          imported.forEach(msg => {
            if (msg.role === 'user' || msg.role === 'assistant') {
              addMessage(msg.role, msg.content);
            }
          });
          saveMessages();
        } catch(e) {
          alert('导入失败，请检查 JSON 格式是否正确');
        }
      });

      // ---------- 事件绑定 ----------
      sendBtn.addEventListener('click', sendMessage);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      });

      // ---------- 初始化 ----------
      if (hasApiKey()) {
        const restored = loadMessages();
        if (restored) {
          // 把历史消息渲染到聊天框
          messages.slice(1).forEach(msg => renderBubble(msg.role, msg.content));
        } else {
          addMessage('assistant', '你好！我是 DeepSeek 助手，有什么可以帮你的？');
        }
      } else {
        loadMessages();
        if (messages.length === 1) {
          addMessage('assistant', '👋 欢迎！请先粘贴你的 DeepSeek API Key 并保存。');
        } else {
          messages.slice(1).forEach(msg => renderBubble(msg.role, msg.content));
        }
      }
    })();
  </script>
</body>
</html>
